---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app calibre-web-automated
spec:
  chartRef:
    kind: OCIRepository
    name: calibre-web-automated
  interval: 1h
  values:
    controllers:
      calibre-web-automated:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            nameOverride: *app
            image:
              repository: crocodilestick/calibre-web-automated
              tag: v4.0.6
            env:
              CACHE_DIR: /cache
              CWA_WATCH_MODE: poll
              DOCKER_MODS: >-
                {{- $items := list
                  "// renovate: lsio-docker-mod"
                  "ghcr.io/linuxserver/mods:universal-calibre-v7.26.0"
                -}} {{- $filtered := list -}} {{- range $item := $items -}}
                  {{- if not (hasPrefix "//" $item) -}}
                    {{- $filtered = append $filtered $item -}}
                  {{- end -}}
                {{- end -}} {{- $filtered | join "|" -}}
              HARDCOVER_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: calibre-secret
                    key: HARDCOVER_TOKEN
              PUID: 1000
              PGID: 1000
              TRUSTED_PROXY_COUNT: 2
              TZ: Australia/Melbourne
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  initialDelaySeconds: 60
                  failureThreshold: 45
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      terminationGracePeriodSeconds: 300
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      # securityContext:
      #   runAsUser: 0
      #   runAsGroup: 0
      #   fsGroup: 1000
      #   fsGroupChangePolicy: OnRootMismatch
      #   supplementalGroups: [ 44 ]
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 8083
    route:
      app:
        hostnames:
          - "calibre.materia.wtf"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      tmpfs:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
      ebooks:
        type: nfs
        server: nas.internal
        path: /mnt/tank/data/media/ebooks
        globalMounts:
          - path: /calibre-library
            readOnly: false
      ingest:
        type: nfs
        server: nas.internal
        path: /mnt/apps/apps-nfs/torrents/ebooks_watch
        globalMounts:
          - path: /cwa-book-ingest
      cache:
        type: emptyDir
        globalMounts:
          - path: /cache
