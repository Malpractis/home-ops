---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre-web-automated
spec:
  chartRef:
    kind: OCIRepository
    name: calibre-web-automated
  interval: 1h
  values:
    controllers:
      calibre-web-automated:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            nameOverride: "{{ .Release.Name }}"
            image:
              repository: crocodilestick/calibre-web-automated
              tag: v4.0.6@sha256:c31a738b6d5ec6982c050063dd3f063b6943eb1051fc81144789f840d9093a8d
            env:
              CACHE_DIR: /cache
              CWA_WATCH_MODE: poll
              HARDCOVER_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: calibre-secret
                    key: HARDCOVER_TOKEN
              PUID: 1000
              PGID: 1000
              TRUSTED_PROXY_COUNT: 1
              TZ: Australia/Melbourne
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 8083
                    path: /login
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: *port
                    path: /
                  failureThreshold: 90
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
                add:
                  # S6
                  - CHOWN
                  - SETUID
                  - SETGID
                  - FOWNER
                  - DAC_OVERRIDE
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: 8083
    route:
      app:
        hostnames:
          - "calibre.materia.wtf"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      cache:
        type: emptyDir
        globalMounts:
          - path: /cache
      ebooks:
        type: nfs
        server: nas.internal
        path: /mnt/tank/data/media/ebooks
        globalMounts:
          - path: /calibre-library
            readOnly: false
      ingest:
        type: nfs
        server: nas.internal
        path: /mnt/apps/apps-nfs/torrents/ebooks_watch
        globalMounts:
          - path: /cwa-book-ingest
      tmp:
        type: emptyDir
