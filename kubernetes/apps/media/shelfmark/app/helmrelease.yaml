---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelfmark
spec:
  chartRef:
    kind: OCIRepository
    name: shelfmark
  interval: 1h
  values:
    controllers:
      shelfmark:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            nameOverride: "{{ .Release.Name }}"
            image:
              repository: ghcr.io/calibrain/shelfmark
              tag: v1.3.4@sha256:056f02e28d446b128d91fa10451c7cc376392f7383bbb841deec49838a419d53
            env:
              AA_BASE_URL: https://annas-archive.li
              AUTH_METHOD: oidc
              CERTIFICATE_VALIDATION: disabled
              CUSTOM_DNS: cloudflare
              FLASK_PORT: &port 8084
              GID: 1000
              OIDC_ADMIN_GROUP: admins
              OIDC_DISCOVERY_URL: https://auth.materia.wtf/application/o/shelfmark/.well-known/openid-configuration
              OIDC_SCOPES: openid,email,profile,groups
              UID: 1000
              USE_DOH: true
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            # TCP probe on the Flask port: / is OIDC-walled (302), so an HTTP
            # 200 check would false-fail — a listening socket is the honest
            # signal that the app is up (previously had no liveness at all).
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [{
            "name": "vpn",
            "namespace": "network",
            "ips": ["192.168.90.11/24"],
            "mac": "5a:9c:1d:2e:3f:4b"
          }]
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.materia.wtf"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      downloads:
        type: nfs
        server: nas.internal
        path: /mnt/tank/data
        globalMounts:
          - path: /data
            readOnly: true
      ingest:
        type: nfs
        server: nas.internal
        path: /mnt/apps/apps-nfs/torrents/ebooks_watch
        globalMounts:
          - path: /cwa-book-ingest
      tmp:
        type: emptyDir
