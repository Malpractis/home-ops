---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shelfmark
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: shelfmark-secret
  data:
    # Same 1Password "shelfmark" item that backs the Authentik OIDC provider (!Env).
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: shelfmark
        property: client-id
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: shelfmark
        property: client-secret
