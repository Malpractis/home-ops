---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml

configMapGenerator:
  - name: recyclarr-configs
    files:
      - radarr-4k.yaml=./config/radarr-4k.yaml
      - radarr-anime.yaml=./config/radarr-anime.yaml
      - radarr.yaml=./config/radarr.yaml
      - sonarr-anime.yaml=./config/sonarr-anime.yaml
      - sonarr.yaml=./config/sonarr.yaml

generatorOptions:
  disableNameSuffixHash: true
