---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: proton-mail-bridge-relay
spec:
  chartRef:
    kind: OCIRepository
    name: proton-mail-bridge-relay
  interval: 1h
  values:
    controllers:
      proton-mail-bridge-relay:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          postfix:
            image:
              repository: mirror.gcr.io/boky/postfix
              tag: 5.1.0@sha256:aafc772384232497bed875e1eb66b4d3e54ba1ebc86e2e185a6dc1dbc48182ef
            env:
              TZ: Australia/Melbourne
              RELAYHOST: "[127.0.0.1]:1025"
              ALLOWED_SENDER_DOMAINS: materia.wtf
              POSTFIX_smtp_tls_security_level: may
              POSTFIX_mynetworks: "127.0.0.0/8 10.42.0.0/16"
            envFrom:
              - secretRef:
                  name: proton-mail-bridge-relay-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &smtp 25
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *smtp
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
            securityContext:
              allowPrivilegeEscalation: true
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETUID", "SETGID", "KILL", "NET_BIND_SERVICE"]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
          bridge:
            image:
              repository: ghcr.io/videocurio/proton-mail-bridge
              tag: v3.24.2@sha256:d44f6b12650c6b0f9e0aefee192d65c6e46d0a22bd5ec189e8624812fd139c8b
            env:
              TZ: Australia/Melbourne
              CONTAINER_SMTP_PORT: 2025
              CONTAINER_IMAP_PORT: &imap 2143
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 2025
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 2025
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              # Bridge spikes during the initial full sync (scales with mailbox
              # size), then settles much lower. 256Mi gets OOMKilled mid-sync.
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          smtp:
            port: *smtp
          imap:
            port: *imap
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          proton-mail-bridge-relay:
            bridge:
              - path: /root
