---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wlogs-parser
spec:
  chartRef:
    kind: OCIRepository
    name: wlogs-parser
  interval: 1h
  values:
    controllers:
      wlogs-parser:
        annotations:
          reloader.stakater.com/auto: "true"
        # RWO PVC: the replacement pod can't mount until the old one is gone.
        strategy: Recreate
        containers:
          app:
            nameOverride: "{{ .Release.Name }}"
            image:
              # Rolling :latest, digest-pinned so Renovate PRs each new build.
              repository: ghcr.io/malpractis/wlogs-parser
              tag: latest@sha256:811ce49f5efd7f23d396ed3005af2c6c2996cb12dc6a063505fe55bfbd6ffa30
            env:
              # OIDC via Authentik (client id/secret + session key come from the secret).
              OIDC_ISSUER: https://auth.materia.wtf/application/o/wlogs-parser
              OIDC_REDIRECT_URL: https://wlogs-parser.materia.wtf/auth
            envFrom:
              - secretRef:
                  name: wlogs-parser-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              # NET_BIND_SERVICE lets the non-root process bind privileged port 80.
              capabilities: {drop: ["ALL"], add: ["NET_BIND_SERVICE"]}
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 80
                  periodSeconds: 30
              readiness: *probe
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 80
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.materia.wtf"
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      reports:
        existingClaim: wlogs-parser
        globalMounts:
          - path: /app/reports
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
