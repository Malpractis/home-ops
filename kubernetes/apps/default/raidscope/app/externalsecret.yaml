---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: raidscope
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: raidscope-secret
  data:
    # NOTE: the 1Password item kept its historical `wlogs-parser` name when the
    # app was rebranded to raidscope (renaming the item must be synchronised
    # with this file via the in-cluster Connect API; do both together or not at all).
    # Warcraft Logs v2 API credentials
    - secretKey: WCL_CLIENT_ID
      remoteRef:
        key: wlogs-parser
        property: WCL_CLIENT_ID
    - secretKey: WCL_CLIENT_SECRET
      remoteRef:
        key: wlogs-parser
        property: WCL_CLIENT_SECRET
    # OIDC client (same client-id/secret as the Authentik provider blueprint)
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: wlogs-parser
        property: client-id
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: wlogs-parser
        property: client-secret
    # Signing key for session cookies (any long random string)
    - secretKey: SESSION_SECRET
      remoteRef:
        key: wlogs-parser
        property: session-secret
