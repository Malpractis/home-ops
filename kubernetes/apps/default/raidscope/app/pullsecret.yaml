---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
# GHCR pull credentials for the private ghcr.io/materia-ops/raidscope image.
# 1Password item `ghcr-pull` needs: username (GitHub user) + token (PAT, read:packages).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ghcr-pull-secret
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >
          {"auths":{"ghcr.io":{"username":"{{ .username }}","password":"{{ .token }}",
          "auth":"{{ printf "%s:%s" .username .token | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: ghcr-pull
        property: username
    - secretKey: token
      remoteRef:
        key: ghcr-pull
        property: token
