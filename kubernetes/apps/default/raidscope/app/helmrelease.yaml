---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: raidscope
spec:
  chartRef:
    kind: OCIRepository
    name: raidscope
  interval: 1h
  values:
    controllers:
      raidscope:
        annotations:
          reloader.stakater.com/auto: "true"
        # RWO PVC: the replacement pod can't mount until the old one is gone.
        strategy: Recreate
        containers:
          app:
            nameOverride: "{{ .Release.Name }}"
            image:
              # Digest-pinned so Renovate PRs each new build. 3.0.0 is the first
              # release under the raidscope package name (the old
              # ghcr.io/malpractis/wlogs-parser images were not migrated).
              repository: ghcr.io/malpractis/raidscope
              tag: 3.0.0@sha256:3dac7a17f0dc8775676222a93d205b36336e8e9ff6ae51198fd1e7a44089be58
            env:
              # OIDC via Authentik (client id/secret + session key come from the secret).
              OIDC_ISSUER: https://auth.materia.wtf/application/o/raidscope
              OIDC_REDIRECT_URL: https://raidscope.materia.wtf/auth
            envFrom:
              - secretRef:
                  name: raidscope-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              # NET_BIND_SERVICE lets the non-root process bind privileged port 80.
              capabilities: {drop: ["ALL"]}
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  periodSeconds: 30
              readiness: *probe
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 8080
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.materia.wtf"
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      reports:
        existingClaim: raidscope
        globalMounts:
          - path: /app/reports
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
