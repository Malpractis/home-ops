---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: raidscope
spec:
  chartRef:
    kind: OCIRepository
    name: raidscope
  interval: 1h
  values:
    controllers:
      raidscope:
        annotations:
          reloader.stakater.com/auto: "true"
        # RWO PVC: the replacement pod can't mount until the old one is gone.
        strategy: Recreate
        containers:
          app:
            nameOverride: "{{ .Release.Name }}"
            image:
              # Digest-pinned so Renovate PRs each new build. 3.0.0 is the first
              # release under the raidscope package name (the old
              # ghcr.io/malpractis/wlogs-parser images were not migrated).
              repository: ghcr.io/malpractis/raidscope
              tag: 3.2.0@sha256:6f78039203cb05e9af0d2001d4e6d3bd2e4a0005b979e0bce3c0ec570bae9f33
            env:
              # OIDC via Authentik (client id/secret + session key come from the secret).
              OIDC_ISSUER: https://auth.materia.wtf/application/o/raidscope
              OIDC_REDIRECT_URL: https://raidscope.materia.wtf/auth
            envFrom:
              - secretRef:
                  name: raidscope-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              # All caps dropped: the app binds unprivileged 8080 (see Dockerfile).
              capabilities: {drop: ["ALL"]}
            probes:
              # Liveness stays on the static /healthz: a storage blip must not
              # restart-loop the pod. Readiness write-probes the reports PVC
              # (/readyz), so a pod on a broken/stale ceph mount stops serving.
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8080
                  periodSeconds: 30
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 8080
    serviceMonitor:
      app:
        endpoints:
          # metrics share the app port; /metrics is OIDC-exempt in the app
          - port: http
    route:
      app:
        annotations:
          # Probe the open health endpoint: the root URL sits behind the OIDC
          # wall, and this must test the CF -> tunnel -> Envoy -> pod path
          # without depending on Authentik being up.
          gatus.home-operations.com/endpoint: |-
            path: /healthz
            conditions: ["[STATUS] == 200"]
        hostnames:
          - "{{ .Release.Name }}.materia.wtf"
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      reports:
        existingClaim: raidscope
        globalMounts:
          - path: /app/reports
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
