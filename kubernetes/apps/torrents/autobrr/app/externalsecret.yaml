---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: autobrr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: autobrr-secret
    template:
      data:
        AUTOBRR__SESSION_SECRET: "{{ .AUTOBRR_SESSION_SECRET }}"
        AUTOBRR__OIDC_CLIENT_ID: '{{ index . "client-id" }}'
        AUTOBRR__OIDC_CLIENT_SECRET: '{{ index . "client-secret" }}'
  dataFrom:
    - extract:
        key: autobrr
