---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cross-seed
spec:
  chartRef:
    kind: OCIRepository
    name: cross-seed
  interval: 1h
  values:
    controllers:
      cross-seed:
        annotations:
          secret.reloader.stakater.com/reload: cross-seed-secret
        pod:
          annotations:
            k8s.ksgate.org/qbittorrent-deployment: |-
              {
                "apiVersion": "apps/v1",
                "kind": "Deployment",
                "name": "qbittorrent",
                "namespace": "torrents",
                "expression": "resource.status.readyReplicas >= 1"
              }
            k8s.ksgate.org/prowlarr-deployment: |-
              {
                "apiVersion": "apps/v1",
                "kind": "Deployment",
                "name": "prowlarr",
                "namespace": "media",
                "expression": "resource.status.readyReplicas >= 1"
              }
          schedulingGates:
            - name: k8s.ksgate.org/qbittorrent-deployment
            - name: k8s.ksgate.org/prowlarr-deployment
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: Always
        containers:
          app:
            nameOverride: "{{ .Release.Name }}"
            image:
              repository: ghcr.io/cross-seed/cross-seed
              tag: 6.13.7@sha256:a1fed512261fd968c55cb03c51cff9c6620aa76a34b3b591afca95c890aa8225
            env:
              CROSS_SEED_PORT: &port 2468
              NODE_OPTIONS: "--max-old-space-size=2048"
            # command: ["/bin/sleep"]
            # args: ["infinity"]
            args:
              - daemon
              - -v
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /api/ping
                spec:
                  initialDelaySeconds: 120
                  periodSeconds: 30   # cross-seed NFS dir scans block the Node.js
                  failureThreshold: 30 # event loop; 30×30s = 15min before kill
              readiness:
                enabled: false
              startup:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 3Gi
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          cross-seed:
            app:
              - path: /config
      cross-seed:
        type: nfs
        server: nas.internal
        path: /mnt/apps/apps-nfs/torrents/cross-seed
        globalMounts:
          - path: /cross-seed
      data:
        type: nfs
        server: nas.internal
        path: /mnt/tank/data
        globalMounts:
          - path: /data
      logs:
        type: emptyDir
        globalMounts:
          - path: /config/logs
      secret-file:
        type: secret
        name: "{{ .Release.Name }}-secret"
        globalMounts:
          - path: /config/config.js
            subPath: config.js
            readOnly: true
      torrents:
        type: nfs
        server: nas.internal
        path: /mnt/apps/apps-nfs/torrents/BT_backup
        globalMounts:
          - path: /torrents
