---
# yaml-language-server: $schema=https://schemas.materia.wtf/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app qbittorrent
spec:
  components:
    - ../../../../components/theme-park
    - ../../../../components/volsync
    - ../../../../components/zeroscaler
  dependsOn:
    - name: multus-networks
      namespace: network
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 30m
  path: ./kubernetes/apps/torrents/qbittorrent/app
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 5Gi
      # Every 6h (was hourly). qbittorrent stores resume data in a single
      # churny SQLite DB (torrents.db), so an hourly snapshot re-chunks most
      # of it each run — the largest contributor to shared-repo index-blob
      # growth. A 6h RPO on torrent resume state is ample.
      VOLSYNC_SCHEDULE: "50 */6 * * *"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: torrents
  wait: false
