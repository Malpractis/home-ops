---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k8tz
spec:
  dependsOn:
    - name: cert-manager
      namespace: security
  interval: 30m
  path: ./kubernetes/apps/system-controllers/k8tz/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: system-controllers
  wait: false
