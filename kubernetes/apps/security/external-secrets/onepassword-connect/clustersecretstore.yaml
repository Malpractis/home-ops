---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword-connect
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect.security.svc.cluster.local
      vaults:
        kubernetes: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: onepassword-connect-vault-secret
            namespace: security
            key: OP_CONNECT_TOKEN