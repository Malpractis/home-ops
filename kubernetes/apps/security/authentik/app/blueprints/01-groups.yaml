---
# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/v1/schema.json
version: 1
metadata:
  name: Materia - Groups
entries:
  # Authentik superusers — full admin panel access, no app bindings
  - id: group_admins
    model: authentik_core.group
    identifiers:
      name: admins
    attrs:
      is_superuser: true

  # Infrastructure operators — access to monitoring, networking, storage, hypervisor
  - id: group_infra
    model: authentik_core.group
    identifiers:
      name: infra
    attrs:
      is_superuser: false

  # Base authenticated user — no app access by itself; parent of media/members
  - id: group_users
    model: authentik_core.group
    identifiers:
      name: users
    attrs:
      is_superuser: false

  # Game realm operators — the wow-panel (scale the AzerothCore realm)
  - id: group_games
    model: authentik_core.group
    identifiers:
      name: games
    attrs:
      is_superuser: false
      parent: !KeyOf group_users

  # Elevated realm admins — unlocks the wow-panel's account-management and GM
  # console tier. Checked in-app via the x-authentik-groups header, not an app
  # binding; parented to games so members inherit panel access itself.
  - id: group_games_admins
    model: authentik_core.group
    identifiers:
      name: games-admins
    attrs:
      is_superuser: false
      parent: !KeyOf group_games

  # Media managers — arr stack, download clients, Stash
  - id: group_media
    model: authentik_core.group
    identifiers:
      name: media
    attrs:
      is_superuser: false
      parent: !KeyOf group_users

  # Media consumers — Seerr (requests) + Calibre (reading); safe to share with members/family
  - id: group_members
    model: authentik_core.group
    identifiers:
      name: members
    attrs:
      is_superuser: false
      parent: !KeyOf group_users
