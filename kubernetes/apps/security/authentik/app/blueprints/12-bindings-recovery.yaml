---
# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/v1/schema.json
version: 1
metadata:
  name: Materia - Flow Bindings - Recovery
entries:
  - id: binding_recovery_identification
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-password-recovery"]]
      stage: !Find [authentik_stages_identification.identificationstage, [name, "materia-recovery-identification"]]
    attrs:
      order: 10
      policy_engine_mode: all  # all([]) = True → always run when no policies

  - id: binding_recovery_email
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-password-recovery"]]
      stage: !Find [authentik_stages_email.emailstage, [name, "materia-recovery-email"]]
    attrs:
      order: 20
      policy_engine_mode: all  # all([]) = True → always run when no policies

  - id: binding_recovery_prompt
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-password-recovery"]]
      stage: !Find [authentik_stages_prompt.promptstage, [name, "materia-recovery-password-prompt"]]
    attrs:
      order: 30
      policy_engine_mode: all  # all([]) = True → always run when no policies

  - id: binding_recovery_user_write
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-password-recovery"]]
      stage: !Find [authentik_stages_user_write.userwritestage, [name, "materia-recovery-user-write"]]
    attrs:
      order: 40
      policy_engine_mode: all  # all([]) = True → always run when no policies

  # Order 45: Force passkey enrolment for EVERYONE who completes recovery — ungated.
  # Recovery is the escape hatch for passkey loss, so this guarantees anyone who comes
  # out the other side has a fresh, working passkey (a lost-device user keeps a stale
  # confirmed WebAuthnDevice in the DB, so a no-passkey gate would wrongly skip them and
  # leave them stuck at the auth flow's order-25 passkey demand). Users who already have
  # a passkey are simply prompted to add another — minor, and acceptable on this flow.
  - id: binding_recovery_passkey_enroll
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-password-recovery"]]
      stage: !Find [authentik_stages_authenticator_webauthn.authenticatorwebauthnstage, [name, "materia-authenticator-webauthn-setup"]]
    attrs:
      order: 45
      policy_engine_mode: all  # all([]) = True → always run when no policies

  - id: binding_recovery_login
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-password-recovery"]]
      stage: !Find [authentik_stages_user_login.userloginstage, [name, "materia-authentication-login"]]
    attrs:
      order: 50
      policy_engine_mode: all  # all([]) = True → always run when no policies
