---
# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/v1/schema.json
version: 1
metadata:
  name: Materia - Flows
entries:
  - id: flow_authentication
    model: authentik_flows.flow
    identifiers:
      slug: materia-authentication
    attrs:
      name: materia-authentication
      title: "Welcome to materia.wtf"
      designation: authentication
      authentication: none
      compatibility_mode: true   # improves compatibility with older browsers/clients
      denied_action: continue    # already-authenticated users are passed through, not errored
      policy_engine_mode: all   # all([]) = True → flow accessible when no flow-level policies

  - id: flow_enrollment
    model: authentik_flows.flow
    identifiers:
      slug: materia-enrollment-invitation
    attrs:
      name: materia-enrollment-invitation
      title: "Welcome to Materia"
      designation: enrollment
      authentication: none
      policy_engine_mode: all

  - id: flow_invalidation
    model: authentik_flows.flow
    identifiers:
      slug: materia-invalidation
    attrs:
      name: materia-session-invalidation
      title: "Signing out…"
      designation: invalidation
      authentication: require_authenticated
      policy_engine_mode: all

  - id: flow_passwordless
    model: authentik_flows.flow
    identifiers:
      slug: materia-passwordless-authentication
    attrs:
      name: materia-passwordless-authentication
      title: "Sign in with a passkey"
      designation: authentication
      authentication: none
      policy_engine_mode: all

  - id: flow_recovery
    model: authentik_flows.flow
    identifiers:
      slug: materia-password-recovery
    attrs:
      name: materia-password-recovery
      title: "Password Recovery"
      designation: recovery
      authentication: none
      policy_engine_mode: all

  - id: flow_user_settings
    model: authentik_flows.flow
    identifiers:
      slug: materia-user-settings
    attrs:
      name: materia-user-settings
      title: "User Settings"
      designation: stage_configuration
      authentication: require_authenticated
      policy_engine_mode: all

  # Used by all social/OAuth sources after the provider authenticates the user.
  # Simply logs the matched/enrolled user in — no identification or password needed
  # since the external provider already handled that.
  - id: flow_source_authentication
    model: authentik_flows.flow
    identifiers:
      slug: materia-source-authentication
    attrs:
      name: materia-source-authentication
      title: "Signing in…"
      designation: authentication
      authentication: none
      policy_engine_mode: all

  # Accessible from user settings → "Change Password" section.
  # A password policy with HaveIBeenPwned + zxcvbn validates the new password.
  - id: flow_password_change
    model: authentik_flows.flow
    identifiers:
      slug: materia-password-change
    attrs:
      name: materia-password-change
      title: "Change Password"
      designation: stage_configuration
      authentication: require_authenticated
      policy_engine_mode: all
