---
# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/v1/schema.json
version: 1
metadata:
  name: Apps - Seerr
entries:
  - id: seerr_provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: seerr
    attrs:
      client_id: !Env SEERR_CLIENT_ID
      client_secret: !Env SEERR_CLIENT_SECRET
      client_type: confidential
      redirect_uris:
        - url: https://requests.materia.wtf/auth/oidc-callback
          matching_mode: strict
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "materia-invalidation"]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "openid"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "profile"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "email"]]
      grant_types:
        - authorization_code
        - refresh_token

  - id: seerr_application
    model: authentik_core.application
    identifiers:
      slug: seerr
    attrs:
      name: Seerr
      provider: !KeyOf seerr_provider
      group: members
      meta_launch_url: https://requests.materia.wtf
      meta_description: "Media requests"
      meta_icon: application-icons/png/seerr.png
      open_in_new_tab: true

  - id: seerr_members_policy_binding
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf seerr_application
      group: !Find [authentik_core.group, [name, "members"]]
    attrs:
      order: 0

  - id: seerr_media_policy_binding
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf seerr_application
      group: !Find [authentik_core.group, [name, "media"]]
    attrs:
      order: 10
