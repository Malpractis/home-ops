---
# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/v1/schema.json
version: 1
metadata:
  name: OAuth Sources
entries:
  - id: source_discord
    model: authentik_sources_oauth.oauthsource
    identifiers:
      slug: discord
    attrs:
      name: Discord
      enabled: true
      provider_type: discord
      consumer_key: !Env DISCORD_CLIENT_ID
      consumer_secret: !Env DISCORD_CLIENT_SECRET
      user_matching_mode: email_link
      authentication_flow: !Find [authentik_flows.flow, [slug, "default-source-authentication"]]
      enrollment_flow: !Find [authentik_flows.flow, [slug, "materia-enrollment-invitation"]]

  - id: source_google
    model: authentik_sources_oauth.oauthsource
    identifiers:
      slug: google
    attrs:
      name: Google
      enabled: true
      provider_type: google
      consumer_key: !Env GOOGLE_CLIENT_ID
      consumer_secret: !Env GOOGLE_CLIENT_SECRET
      user_matching_mode: email_link
      authentication_flow: !Find [authentik_flows.flow, [slug, "default-source-authentication"]]
      enrollment_flow: !Find [authentik_flows.flow, [slug, "materia-enrollment-invitation"]]

  - id: source_github
    model: authentik_sources_oauth.oauthsource
    identifiers:
      slug: github
    attrs:
      name: GitHub
      enabled: true
      provider_type: github
      consumer_key: !Env GITHUB_CLIENT_ID
      consumer_secret: !Env GITHUB_CLIENT_SECRET
      user_matching_mode: email_link
      authentication_flow: !Find [authentik_flows.flow, [slug, "default-source-authentication"]]
      enrollment_flow: !Find [authentik_flows.flow, [slug, "materia-enrollment-invitation"]]

  - id: source_plex
    model: authentik_sources_plex.plexsource
    identifiers:
      slug: plex
    attrs:
      name: Plex
      enabled: true
      client_id: !Env PLEX_CLIENT_ID
      plex_token: !Env PLEX_TOKEN
      allow_friends: false
      user_matching_mode: email_link
      authentication_flow: !Find [authentik_flows.flow, [slug, "default-source-authentication"]]
      enrollment_flow: !Find [authentik_flows.flow, [slug, "materia-enrollment-invitation"]]
