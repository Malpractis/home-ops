---
# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/v1/schema.json
version: 1
metadata:
  name: Materia - Flow Bindings - Authentication + Source
entries:
  # Order 5: Deny (only when reputation is bad — policy is negated)
  - id: binding_auth_deny
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-authentication"]]
      stage: !Find [authentik_stages_deny.denystage, [name, "materia-reputation-deny"]]
    attrs:
      order: 5
      policy_engine_mode: all

  - id: policy_binding_auth_deny_reputation
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf binding_auth_deny
      policy: !Find [authentik_policies_reputation.reputationpolicy, [name, "materia-reputation-block"]]
    attrs:
      order: 0
      negate: false  # ReputationPolicy passes=True when score <= threshold (bad rep); no negate needed
      failure_result: true  # policy error → show deny stage (fail safe)

  # Order 10: Captcha (remote clients only — i.e. NOT on the LAN)
  - id: binding_auth_captcha
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-authentication"]]
      stage: !Find [authentik_stages_captcha.captchastage, [name, "materia-authentication-captcha"]]
    attrs:
      order: 10
      policy_engine_mode: all

  - id: policy_binding_auth_captcha_remote
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf binding_auth_captcha
      policy: !Find [authentik_policies_expression.expressionpolicy, [name, "materia-lan-check"]]
    attrs:
      order: 0
      negate: true          # captcha runs only when NOT on the LAN (remote)
      failure_result: true  # policy error → show captcha (fail safe)

  # Order 20: Identification (always shown)
  - id: binding_auth_identification
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-authentication"]]
      stage: !Find [authentik_stages_identification.identificationstage, [name, "materia-authentication-identification"]]
    attrs:
      order: 20
      policy_engine_mode: all  # all([]) = True → always run when no policies

  # Order 25: Passkey (WebAuthn) as first factor — for any client whose identified
  # user has a passkey enrolled. Prompted BEFORE password; on success the password
  # (30) and MFA (40) stages are skipped (materia-no-passkey), giving a single-gesture
  # login. Users without a passkey skip this stage and fall through to the password
  # stage. Identification (20) always runs first, avoiding the passkey discovery loop.
  - id: binding_auth_passkey
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-authentication"]]
      stage: !Find [authentik_stages_authenticator_validate.authenticatorvalidatestage, [name, "materia-authentication-passkey-validation"]]
    attrs:
      order: 25
      policy_engine_mode: all

  - id: policy_binding_auth_passkey_has
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf binding_auth_passkey
      policy: !Find [authentik_policies_expression.expressionpolicy, [name, "materia-has-passkey"]]
    attrs:
      order: 1
      failure_result: false  # policy error → skip passkey, fall through to password

  # Order 30: Password — shown only when the identified user has no passkey.
  - id: binding_auth_password
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-authentication"]]
      stage: !Find [authentik_stages_password.passwordstage, [name, "materia-authentication-password"]]
    attrs:
      order: 30
      policy_engine_mode: all

  # Skip the password stage for users who logged in with a passkey at order 25.
  - id: policy_binding_auth_password_no_passkey
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf binding_auth_password
      policy: !Find [authentik_policies_expression.expressionpolicy, [name, "materia-no-passkey"]]
    attrs:
      order: 1
      failure_result: true  # policy error → require password (fail safe)

  # Order 40: MFA Validation — shown only when the user has no passkey.
  - id: binding_auth_mfa
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-authentication"]]
      stage: !Find [authentik_stages_authenticator_validate.authenticatorvalidatestage, [name, "materia-authentication-mfa-validation"]]
    attrs:
      order: 40
      policy_engine_mode: all

  # Skip this MFA stage for passkey users — the order-25 passkey (user_verification
  # required) already provides a strong factor. Non-passkey users still get MFA
  # (and are forced to enrol via not_configured_action=configure).
  - id: policy_binding_auth_mfa_no_passkey
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf binding_auth_mfa
      policy: !Find [authentik_policies_expression.expressionpolicy, [name, "materia-no-passkey"]]
    attrs:
      order: 1
      failure_result: true  # policy error → require MFA (fail safe)

  # Order 45: Force passkey enrolment for any user who logged in with a password and
  # doesn't yet have one. Once enrolled, materia-no-passkey flips to False so this
  # stage (and the password/MFA stages) are skipped, and they get passkey-first login
  # at order 25 thereafter.
  # NOTE: hard requirement — a client without WebAuthn support cannot finish login.
  # Acceptable for a small trusted user base; the password-recovery flow is the escape
  # hatch. The policy binding fail-safes to SKIP enrolment so a policy engine error
  # never wedges login.
  - id: binding_auth_passkey_enroll
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-authentication"]]
      stage: !Find [authentik_stages_authenticator_webauthn.authenticatorwebauthnstage, [name, "materia-authenticator-webauthn-setup"]]
    attrs:
      order: 45
      policy_engine_mode: all

  - id: policy_binding_auth_passkey_enroll_no_passkey
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf binding_auth_passkey_enroll
      policy: !Find [authentik_policies_expression.expressionpolicy, [name, "materia-no-passkey"]]
    attrs:
      order: 1
      failure_result: false  # policy error → assume passkey exists, skip enrolment

  # Order 100: User Login (always runs)
  - id: binding_auth_login
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-authentication"]]
      stage: !Find [authentik_stages_user_login.userloginstage, [name, "materia-authentication-login"]]
    attrs:
      order: 100
      policy_engine_mode: all  # all([]) = True → always run when no policies

  # --- materia-source-authentication ---
  # Used by all OAuth/social sources after the provider has authenticated the user.
  # Single stage: log the matched user in. No identification or password needed.
  - id: binding_source_auth_login
    model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, "materia-source-authentication"]]
      stage: !Find [authentik_stages_user_login.userloginstage, [name, "materia-authentication-login"]]
    attrs:
      order: 10
      policy_engine_mode: all  # all([]) = True → always run when no policies
