---
# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/v1/schema.json
version: 1
metadata:
  name: Apps - Proxy (Admin)
entries:
  # ── VictoriaMetrics ───────────────────────────────────────────────────────────
  - id: provider_vmsingle
    model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: victoriametrics
    attrs:
      mode: forward_single
      external_host: https://vmsingle.materia.wtf
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "materia-invalidation"]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "proxy-outpost-reduced"]]

  - id: app_vmsingle
    model: authentik_core.application
    identifiers:
      slug: vmsingle
    attrs:
      name: VictoriaMetrics
      provider: !KeyOf provider_vmsingle
      group: infra
      meta_launch_url: https://vmsingle.materia.wtf
      meta_description: Metrics
      meta_icon: application-icons/svg/victoriametrics.svg
      open_in_new_tab: true

  - id: policy_binding_vmsingle
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf app_vmsingle
      group: !Find [authentik_core.group, [name, "infra"]]
    attrs:
      order: 0

