---
# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/v1/schema.json
version: 1
metadata:
  name: Materia - Apps - Grafana
entries:
  - id: grafana_provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: grafana
    attrs:
      client_id: !Env GRAFANA_CLIENT_ID
      client_secret: !Env GRAFANA_CLIENT_SECRET
      client_type: confidential
      redirect_uris:
        - url: https://grafana.materia.wtf/login/generic_oauth
          matching_mode: strict
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "materia-invalidation"]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "openid"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "profile"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "email"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "groups"]]
      grant_types:
        - authorization_code
        - refresh_token

  - id: grafana_application
    model: authentik_core.application
    identifiers:
      slug: grafana
    attrs:
      name: Grafana
      provider: !KeyOf grafana_provider
      group: infra
      meta_launch_url: https://grafana.materia.wtf
      meta_description: "Metrics & dashboards"
      meta_icon: application-icons/svg/grafana.svg
      open_in_new_tab: true

  - id: grafana_admins_policy_binding
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf grafana_application
      group: !Find [authentik_core.group, [name, "infra"]]
    attrs:
      order: 0
