      target: !Find [authentik_flows.flow, [slug, "materia-enrollment-invitation"]]
      stage: !Find [authentik_stages_user_write.userwritestage, [name, "materia-enrollment-user-write"]]
    attrs:
      order: 30
      policy_engine_mode: all  # all([]) = True → always run when no policies

  - id: binding_enrollment_email_verification
