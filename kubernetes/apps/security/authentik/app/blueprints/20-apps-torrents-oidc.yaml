---
# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/v1/schema.json
version: 1
metadata:
  name: Materia - Apps - qui + autobrr (OIDC)
entries:
  # NOTE: the old autobrr forward-auth proxy provider + application were deleted
  # manually in the Authentik UI during migration. Their declarations were removed
  # from 17-apps-proxy-media.yaml and the outpost in 19-outpost.yaml so they are not
  # recreated. The autobrr OIDC application below reuses slug "autobrr".

  # ── qui (OIDC) ────────────────────────────────────────────────────────────────
  - id: qui_provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: qui
    attrs:
      client_id: !Env QUI_CLIENT_ID
      client_secret: !Env QUI_CLIENT_SECRET
      client_type: confidential
      redirect_uris:
        - url: https://qui.materia.wtf/api/auth/oidc/callback
          matching_mode: strict
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "materia-invalidation"]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "openid"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "profile"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "email"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "groups"]]
      grant_types:
        - authorization_code
        - refresh_token

  - id: qui_application
    model: authentik_core.application
    identifiers:
      slug: qui
    attrs:
      name: qui
      provider: !KeyOf qui_provider
      group: media
      meta_launch_url: https://qui.materia.wtf
      meta_description: "Torrent management"
      meta_icon: application-icons/svg/qbittorrent.svg
      open_in_new_tab: true

  - id: qui_policy_binding
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf qui_application
      group: !Find [authentik_core.group, [name, "media"]]
    attrs:
      order: 0

  # ── autobrr (OIDC) ──────────────────────────────────────────────────────────────
  - id: autobrr_provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: autobrr
    attrs:
      client_id: !Env AUTOBRR_CLIENT_ID
      client_secret: !Env AUTOBRR_CLIENT_SECRET
      client_type: confidential
      redirect_uris:
        - url: https://autobrr.materia.wtf/api/auth/oidc/callback
          matching_mode: strict
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "materia-invalidation"]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "openid"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "profile"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "email"]]
      grant_types:
        - authorization_code
        - refresh_token

  - id: autobrr_application
    model: authentik_core.application
    identifiers:
      slug: autobrr
    attrs:
      name: autobrr
      provider: !KeyOf autobrr_provider
      group: media
      meta_launch_url: https://autobrr.materia.wtf
      meta_description: Torrent automation
      meta_icon: application-icons/svg/autobrr.svg
      open_in_new_tab: true

  - id: autobrr_policy_binding
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf autobrr_application
      group: !Find [authentik_core.group, [name, "media"]]
    attrs:
      order: 0
