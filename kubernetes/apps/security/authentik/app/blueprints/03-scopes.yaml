---
# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/v1/schema.json
version: 1
metadata:
  name: OAuth2 Scopes
entries:
  - id: scope_groups
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: Groups
      scope_name: groups
    attrs:
      expression: "return list(request.user.ak_groups.values_list('name', flat=True))"

  # Reduced proxy outpost scope — strips large/unnecessary attributes (avatars, etc.)
  # from the JWT forwarded by the embedded outpost. Cuts ~18kB off every forward-auth header.
  # Used in place of the default "authentik default OAuth Mapping: Proxy outpost" scope
  # on all proxy providers.
  - id: scope_proxy_outpost_reduced
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: "authentik default OAuth Mapping: Proxy outpost reduced"
      scope_name: proxy-outpost-reduced
    attrs:
      expression: |
        keys_to_exclude = ["avatar"]
        return {
            "ak_proxy": {
                "user_attributes": {
                    key: value
                    for key, value in request.user.group_attributes(request).items()
                    if key not in keys_to_exclude
                },
                "is_superuser": request.user.is_superuser,
            }
        }
