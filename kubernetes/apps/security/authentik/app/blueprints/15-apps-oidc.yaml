  - id: raidscope_application
    model: authentik_core.application
    identifiers:
      slug: raidscope
    attrs:
      name: raidscope
      provider: !KeyOf raidscope_provider
      group: infra
      meta_launch_url: https://raidscope.materia.wtf
      meta_description: "Warcraft Logs guild analysis"
      open_in_new_tab: true

  - id: raidscope_admins_policy_binding
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf raidscope_application
      group: !Find [authentik_core.group, [name, "infra"]]
    attrs:
      order: 0

  # ── TrueNAS ───────────────────────────────────────────────────────────────────
  - id: truenas_provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: truenas
    attrs:
      client_id: !Env TRUENAS_CLIENT_ID
      client_secret: !Env TRUENAS_CLIENT_SECRET
      client_type: confidential
      redirect_uris:
        - url: https://nas.materia.wtf/api/v2.0/auth/oidc_callback
          matching_mode: strict
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "materia-invalidation"]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "openid"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "profile"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "email"]]
      grant_types:
        - authorization_code
        - refresh_token

  - id: truenas_application
    model: authentik_core.application
    identifiers:
      slug: truenas
    attrs:
      name: TrueNAS
      provider: !KeyOf truenas_provider
      group: infra
      meta_launch_url: https://nas.materia.wtf
      meta_description: "NAS & storage"
      meta_icon: application-icons/svg/truenas-scale.svg
      open_in_new_tab: true

  - id: truenas_admins_policy_binding
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf truenas_application
      group: !Find [authentik_core.group, [name, "infra"]]
    attrs:
      order: 0

  # wlogs-parser — superseded by raidscope (rebrand). Blueprint removal alone
  # would orphan the live objects, so delete them explicitly; the application's
  # policy bindings cascade with it. Drop these entries once applied.
  - id: wlogs_parser_application
    model: authentik_core.application
    state: absent
    identifiers:
      slug: wlogs-parser

  - id: wlogs_parser_provider
    model: authentik_providers_oauth2.oauth2provider
    state: absent
    identifiers:
      name: wlogs-parser

  # ════════════════════════════════════════════════════════════════════════════
  # Media
  # ════════════════════════════════════════════════════════════════════════════

  # ── autobrr ─────────────────────────────────────────────────────────────────────
