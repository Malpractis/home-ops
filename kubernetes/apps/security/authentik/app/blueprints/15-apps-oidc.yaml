        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "profile"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "email"]]
      grant_types:
        - authorization_code
        - refresh_token

  - id: autobrr_application
    model: authentik_core.application
    identifiers:
      slug: autobrr
    attrs:
      name: autobrr
      provider: !KeyOf autobrr_provider
      group: media
      meta_launch_url: https://autobrr.materia.wtf
      meta_description: Torrent automation
      meta_icon: application-icons/svg/autobrr.svg
      open_in_new_tab: true

  - id: autobrr_policy_binding
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf autobrr_application
      group: !Find [authentik_core.group, [name, "media"]]
    attrs:
      order: 0

  # ── Calibre-Web-Automated ─────────────────────────────────────────────────────
  # OIDC provider for CWA. CWA's redirect path for a generic
