  # ── Shelfmark (book downloader) ───────────────────────────────────────────────
  # Native OIDC (replaced the proxy provider that was in 16/18). Callback path is
  # /api/auth/oidc/callback. client_id + secret are !Env from 1Password.
  - id: shelfmark_provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: shelfmark
    attrs:
      client_id: !Env SHELFMARK_CLIENT_ID
