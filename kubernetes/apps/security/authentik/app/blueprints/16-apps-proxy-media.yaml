---
# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/v1/schema.json
version: 1
metadata:
  name: Materia - Apps - Proxy (Media)
entries:
  # ── Radarr ──────────────────────────────────────────────────────────────────
  - id: provider_radarr
    model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: radarr
    attrs:
      mode: forward_single
      external_host: https://radarr.materia.wtf
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "materia-invalidation"]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "proxy-outpost-reduced"]]

  - id: app_radarr
    model: authentik_core.application
    identifiers:
      slug: radarr
    attrs:
      name: Radarr
      provider: !KeyOf provider_radarr
      group: media
      meta_launch_url: https://radarr.materia.wtf
      meta_description: Movies
      meta_icon: application-icons/svg/radarr.svg
      open_in_new_tab: true

  - id: policy_binding_radarr
    model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf app_radarr
      group: !Find [authentik_core.group, [name, "media"]]
    attrs:
      order: 0

