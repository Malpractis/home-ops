---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-blueprint
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authentik-blueprint-secrets
  data:
    # Cloudflare Turnstile — captcha stage
    - secretKey: TURNSTILE_SITE_KEY
      remoteRef:
        key: cloudflare-turnstile
        property: site-key
    - secretKey: TURNSTILE_SECRET_KEY
      remoteRef:
        key: cloudflare-turnstile
        property: secret-key
    # Discord OAuth source
    - secretKey: DISCORD_CLIENT_ID
      remoteRef:
        key: discord-oauth
        property: client-id
    - secretKey: DISCORD_CLIENT_SECRET
      remoteRef:
        key: discord-oauth
        property: client-secret
    # Google OAuth source
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: google-oauth
        property: client-id
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: google-oauth
        property: client-secret
    # GitHub OAuth source
    - secretKey: GITHUB_CLIENT_ID
      remoteRef:
        key: github-oauth
        property: client-id
    - secretKey: GITHUB_CLIENT_SECRET
      remoteRef:
        key: github-oauth
        property: client-secret
    # Plex source
    - secretKey: PLEX_CLIENT_ID
      remoteRef:
        key: plex-oauth
        property: client-id
    - secretKey: PLEX_TOKEN
      remoteRef:
        key: plex-oauth
        property: token
    # Grafana OIDC provider
    - secretKey: GRAFANA_CLIENT_ID
      remoteRef:
        key: grafana
        property: client-id
    - secretKey: GRAFANA_CLIENT_SECRET
      remoteRef:
        key: grafana
        property: client-secret
    # Seerr OIDC provider
    - secretKey: SEERR_CLIENT_ID
      remoteRef:
        key: seerr
        property: client-id
    - secretKey: SEERR_CLIENT_SECRET
      remoteRef:
        key: seerr
        property: client-secret
    # TrueNAS OIDC provider
    - secretKey: TRUENAS_CLIENT_ID
      remoteRef:
        key: truenas
        property: client-id
    - secretKey: TRUENAS_CLIENT_SECRET
      remoteRef:
        key: truenas
        property: client-secret
