---
# yaml-language-server: $schema=https://schemas.materia.wtf/gateway.networking.k8s.io/referencegrant_v1beta1.json
# adapted from https://github.com/authelia/authelia/blob/master/docs/content/integration/proxies/envoy.md#secure-route
# Split into two grants (SecurityPolicy refs / HTTPRoute refs) because the API
# caps spec.from at 16 items and the combined list outgrew it; multiple
# ReferenceGrants are additive.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: ref-authentik-svc
spec:
  from:
    # SecurityPolicy (ext_authz) references to the outpost Service
    - &policy
      group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: database
    - <<: *policy
      namespace: flux-system
    - <<: *policy
      namespace: games
    - <<: *policy
      namespace: media
    - <<: *policy
      namespace: network
    - <<: *policy
      namespace: o11y
    - <<: *policy
      namespace: storage
    - <<: *policy
      namespace: system
    - <<: *policy
      namespace: torrents
  to:
    - group: ''
      kind: Service
      name: authentik-server
---
# yaml-language-server: $schema=https://schemas.materia.wtf/gateway.networking.k8s.io/referencegrant_v1beta1.json
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: ref-authentik-svc-routes
spec:
  from:
    # HTTPRoute (outpost callback path) backendRefs to the outpost Service
    - &route
      group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: database
    - <<: *route
      namespace: flux-system
    - <<: *route
      namespace: games
    - <<: *route
      namespace: media
    - <<: *route
      namespace: network
    - <<: *route
      namespace: o11y
    - <<: *route
      namespace: storage
    - <<: *route
      namespace: system
    - <<: *route
      namespace: torrents
  to:
    - group: ''
      kind: Service
      name: authentik-server
