---
# yaml-language-server: $schema=https://schemas.materia.wtf/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
  annotations:
    gatus.home-operations.com/endpoint: |-
      path: /-/health/live/
      conditions: ["[STATUS] == 200"]
spec:
  hostnames:
    - auth.materia.wtf
  parentRefs:
    - name: envoy-external
      namespace: network
    - name: envoy-internal
      namespace: network
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
