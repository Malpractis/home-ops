---
# yaml-language-server: $schema=https://schemas.materia.wtf/monitoring.coreos.com/prometheusrule_v1.json
# Replaces the authentik helm chart's built-in PrometheusRule (disabled via
# prometheus.rules.enabled: false) so we can maintain correct metric names.
#
# django-prometheus >= 2.x appends _total to counter names per the Prometheus
# naming convention. The upstream chart rules still reference the old names
# without the suffix, causing RecordingRulesNoData alerts for every rule.
#
# Removed groups:
#   - "authentik Aggregate model operations": django_model_{inserts,updates,deletes}_total
#     are model-signal metrics that authentik does not expose.
#   - "authentik Aggregate migrations": django_migrations_{applied,unapplied}_total
#     are not scraped from authentik's /metrics endpoint.
#     (The PendingMigrations alert in the Alerts group still references
#      django_migrations_unapplied_total directly and will fire if it ever appears.)
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: authentik
  namespace: security
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/instance: authentik
    app.kubernetes.io/part-of: authentik
spec:
  groups:
    - name: authentik Aggregate request counters
      rules:
        - expr: sum(rate(django_http_requests_before_middlewares_total[30s])) by (job)
          record: job:django_http_requests_before_middlewares_total:sum_rate30s
        - expr: sum(rate(django_http_requests_unknown_latency_total[30s])) by (job)
          record: job:django_http_requests_unknown_latency_total:sum_rate30s
        - expr: sum(rate(django_http_ajax_requests_total[30s])) by (job)
          record: job:django_http_ajax_requests_total:sum_rate30s
        - expr: sum(rate(django_http_responses_before_middlewares_total[30s])) by (job)
          record: job:django_http_responses_before_middlewares_total:sum_rate30s
        - expr: sum(rate(django_http_requests_unknown_latency_including_middlewares_total[30s])) by (job)
          record: job:django_http_requests_unknown_latency_including_middlewares_total:sum_rate30s
        # histogram _sum used for bytes-per-second (chart used bare histogram name which doesn't exist)
        - expr: sum(rate(django_http_requests_body_total_bytes_sum[30s])) by (job)
          record: job:django_http_requests_body_total_bytes:sum_rate30s
        - expr: sum(rate(django_http_responses_streaming_total[30s])) by (job)
          record: job:django_http_responses_streaming_total:sum_rate30s
        - expr: sum(rate(django_http_responses_body_total_bytes_sum[30s])) by (job)
          record: job:django_http_responses_body_total_bytes:sum_rate30s
        # _total suffix added for all counter metrics below (django-prometheus >= 2.x)
        - expr: sum(rate(django_http_requests_total_by_method_total[30s])) by (job)
          record: job:django_http_requests_total:sum_rate30s
        - expr: sum(rate(django_http_requests_total_by_method_total[30s])) by (job, method)
          record: job:django_http_requests_total_by_method:sum_rate30s
        - expr: sum(rate(django_http_requests_total_by_transport_total[30s])) by (job, transport)
          record: job:django_http_requests_total_by_transport:sum_rate30s
        - expr: sum(rate(django_http_requests_total_by_view_transport_method_total[30s])) by (job, view)
          record: job:django_http_requests_total_by_view:sum_rate30s
        - expr: sum(rate(django_http_requests_total_by_view_transport_method_total[30s])) by (job, view, transport, method)
          record: job:django_http_requests_total_by_view_transport_method:sum_rate30s
        - expr: sum(rate(django_http_responses_total_by_templatename_total[30s])) by (job, templatename)
          record: job:django_http_responses_total_by_templatename:sum_rate30s
        - expr: sum(rate(django_http_responses_total_by_status_total[30s])) by (job, status)
          record: job:django_http_responses_total_by_status:sum_rate30s
        # metric renamed: status_name_method → status_view_method; label "name" → "view"
        - expr: sum(rate(django_http_responses_total_by_status_view_method_total[30s])) by (job, status, view, method)
          record: job:django_http_responses_total_by_status_name_method:sum_rate30s
        - expr: sum(rate(django_http_responses_total_by_charset_total[30s])) by (job, charset)
          record: job:django_http_responses_total_by_charset:sum_rate30s
        - expr: sum(rate(django_http_exceptions_total_by_type_total[30s])) by (job, type)
          record: job:django_http_exceptions_total_by_type:sum_rate30s
        - expr: sum(rate(django_http_exceptions_total_by_view_total[30s])) by (job, view)
          record: job:django_http_exceptions_total_by_view:sum_rate30s

    - name: authentik Aggregate latency histograms
      rules:
        - expr: histogram_quantile(0.50, sum(rate(django_http_requests_latency_including_middlewares_seconds_bucket[30s])) by (job, le))
          labels:
            quantile: "50"
          record: job:django_http_requests_latency_including_middlewares_seconds:quantile_rate30s
        - expr: histogram_quantile(0.95, sum(rate(django_http_requests_latency_including_middlewares_seconds_bucket[30s])) by (job, le))
          labels:
            quantile: "95"
          record: job:django_http_requests_latency_including_middlewares_seconds:quantile_rate30s
        - expr: histogram_quantile(0.99, sum(rate(django_http_requests_latency_including_middlewares_seconds_bucket[30s])) by (job, le))
          labels:
            quantile: "99"
          record: job:django_http_requests_latency_including_middlewares_seconds:quantile_rate30s
        - expr: histogram_quantile(0.999, sum(rate(django_http_requests_latency_including_middlewares_seconds_bucket[30s])) by (job, le))
          labels:
            quantile: "99.9"
          record: job:django_http_requests_latency_including_middlewares_seconds:quantile_rate30s
        # chart referenced django_http_requests_latency_seconds_bucket which does not exist;
        # actual metric is django_http_requests_latency_seconds_by_view_method_bucket
        - expr: histogram_quantile(0.50, sum(rate(django_http_requests_latency_seconds_by_view_method_bucket[30s])) by (job, le))
          labels:
            quantile: "50"
          record: job:django_http_requests_latency_seconds:quantile_rate30s
        - expr: histogram_quantile(0.95, sum(rate(django_http_requests_latency_seconds_by_view_method_bucket[30s])) by (job, le))
          labels:
            quantile: "95"
          record: job:django_http_requests_latency_seconds:quantile_rate30s
        - expr: histogram_quantile(0.99, sum(rate(django_http_requests_latency_seconds_by_view_method_bucket[30s])) by (job, le))
          labels:
            quantile: "99"
          record: job:django_http_requests_latency_seconds:quantile_rate30s
        - expr: histogram_quantile(0.999, sum(rate(django_http_requests_latency_seconds_by_view_method_bucket[30s])) by (job, le))
          labels:
            quantile: "99.9"
          record: job:django_http_requests_latency_seconds:quantile_rate30s

    - name: authentik Aggregate database operations
      rules:
        - expr: sum(rate(django_db_new_connections_total[30s])) by (alias, vendor)
          record: job:django_db_new_connections_total:sum_rate30s
        - expr: sum(rate(django_db_new_connection_errors_total[30s])) by (alias, vendor)
          record: job:django_db_new_connection_errors_total:sum_rate30s
        - expr: sum(rate(django_db_execute_total[30s])) by (alias, vendor)
          record: job:django_db_execute_total:sum_rate30s
        - expr: sum(rate(django_db_execute_many_total[30s])) by (alias, vendor)
          record: job:django_db_execute_many_total:sum_rate30s
        - expr: sum(rate(django_db_errors_total[30s])) by (alias, vendor, type)
          record: job:django_db_errors_total:sum_rate30s

    - name: authentik Alerts
      rules:
        - alert: NoWorkersConnected
          annotations:
            message: authentik instance {{ $labels.instance }}'s worker are either not running or not connected.
            summary: No workers connected
          expr: max(authentik_tasks_workers) < 1
          for: 10m
          labels:
            severity: critical
        - alert: PendingMigrations
          annotations:
            message: authentik instance {{ $labels.instance }} has pending database migrations
            summary: Pending database migrations
          expr: max without (pid) (django_migrations_unapplied_total) > 0
          for: 10m
          labels:
            severity: critical
        - alert: FailedSystemTasks
          annotations:
            message: System task {{ $labels.actor_name }} has failed on authentik instance {{ $labels.instance }}
            summary: Failed system tasks
          expr: sum(increase(authentik_tasks_errors_total[2h])) by (actor_name) > 0
          for: 2h
          labels:
            severity: critical
        - alert: DisconnectedOutposts
          annotations:
            message: Outpost {{ $labels.outpost }} has at least 1 disconnected instance
            summary: Disconnected outpost
          expr: sum by (outpost) (max without (pid) (authentik_outposts_connected{uid!~"specific.*"})) < 1
          for: 30m
          labels:
            severity: critical
