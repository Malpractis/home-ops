---
# yaml-language-server: $schema=https://schemas.materia.wtf/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: authentik
  driftDetection:
    ignore:
      - paths: [/spec/replicas]
  values:
    blueprints:
      configMaps:
        - authentik-blueprints
      secrets: []
    global:
      podAnnotations:
        secret.reloader.stakater.com/reload: authentik-secret,postgres-authentik-credentials,authentik-blueprint-secrets
        configmap.reloader.stakater.com/reload: authentik-blueprints
      deploymentStrategy:
        type: RollingUpdate
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      env:
        # Use the right source IP
        # TODO netpol to limit traffic to gateway pods
        - name: AUTHENTIK_LISTEN__TRUSTED_PROXY_CIDRS
          value: 10.42.0.0/16
        # Raise policy cache TTL from default 120s — with 30+ proxy apps the
        # cold evaluation path hits 7-8s p99; keeping results warm longer
        # prevents every post-blueprint-flush request from being slow.
        - name: AUTHENTIK_POLICY__CACHE_TIMEOUT
          value: "600"
        - name: AUTHENTIK_POLICY__CACHE_TIMEOUT_FLOWS
          value: "600"
        # PostgreSQL SSL — encrypted transport, no client cert (password auth)
        - name: AUTHENTIK_POSTGRESQL__SSLMODE
          value: require
        - name: AUTHENTIK_POSTGRESQL__NAME
          value: authentik
        # Media file storage
        - name: AUTHENTIK_STORAGE__MEDIA__BACKEND
          value: s3
        - name: AUTHENTIK_STORAGE__MEDIA__S3__USE_SSL
          value: "true"
        - name: AUTHENTIK_STORAGE__MEDIA__S3__SECURE_URLS
          value: "true"
        - name: AUTHENTIK_STORAGE__MEDIA__S3__QUERYSTRING_AUTH
          value: "false"
      envFrom:
        - secretRef:
            name: &secret authentik-secret
        - secretRef:
            name: postgres-authentik-credentials
        - secretRef:
            name: authentik-blueprint-secrets
    authentik:
      postgresql:
        host: postgres-authentik-pooler.security.svc.cluster.local
        port: 5432
      email:
        # In-cluster Proton Mail Bridge relay (default ns) — no auth, no TLS.
        host: proton-mail-bridge-relay.default.svc.cluster.local
        port: 25
        use_tls: false
        use_ssl: false
        from: "Authentik <noreply@materia.wtf>"
    server:
      autoscaling:
        enabled: true
        # Floor of 2 so the SSO front-end survives a node drain (and so the PDB
        # can actually allow a disruption — a PDB over a single pod blocks it).
        minReplicas: 2
        maxReplicas: 2
        targetCPUUtilizationPercentage: 60
        behavior:
          scaleUp:
            stabilizationWindowSeconds: 300
          scaleDown:
            stabilizationWindowSeconds: 300
      resources:
        requests:
          cpu: 300m
          memory: 256Mi
        limits:
          memory: 1Gi
      livenessProbe:
        failureThreshold: 6
        periodSeconds: 15
        timeoutSeconds: 5
      readinessProbe:
        timeoutSeconds: 5
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
    worker:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 60
        behavior:
          scaleUp:
            stabilizationWindowSeconds: 300
          scaleDown:
            stabilizationWindowSeconds: 300
      resources:
        requests:
          cpu: 300m
          memory: 256Mi
        limits:
          memory: 1Gi
    geoip:
      enabled: false
      existingSecret:
        secretName: *secret
        accountId: "AUTHENTIK_GEOIP_ACCOUNT_ID"
        licenseKey: "AUTHENTIK_GEOIP_LICENSE_KEY"
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi
    prometheus:
      rules:
        enabled: false  # managed via prometheusrule.yaml with corrected metric names
