---
# yaml-language-server: $schema=https://schemas.materia.wtf/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app authentik
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  driftDetection:
    ignore:
      - paths: [/spec/replicas]
  values:
    blueprints:
      configMaps:
        - authentik-blueprints
      secrets: []
    global:
      podAnnotations:
        secret.reloader.stakater.com/reload: authentik-secret,postgres-authentik-secret,authentik-blueprint-secrets
        configmap.reloader.stakater.com/reload: authentik-blueprints
      deploymentStrategy:
        type: RollingUpdate
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      env:
        # Use the right source IP
        # TODO netpol to limit traffic to gateway pods
        - name: AUTHENTIK_LISTEN__TRUSTED_PROXY_CIDRS
          value: 10.42.0.0/16
        # PostgreSQL SSL — encrypted transport, no client cert (password auth)
        - name: AUTHENTIK_POSTGRESQL__SSLMODE
          value: require
        # Required when using pgBouncer in transaction mode — disables prepared statements
        - name: AUTHENTIK_POSTGRESQL__USE_PGBOUNCER
          value: "true"
        # Release connections back to pool after each request (required for PgBouncer transaction mode)
        - name: AUTHENTIK_POSTGRESQL__CONN_MAX_AGE
          value: "0"
        - name: AUTHENTIK_POSTGRESQL__NAME
          value: authentik
        # Media file storage
        - name: AUTHENTIK_STORAGE__MEDIA__BACKEND
          value: s3
        - name: AUTHENTIK_STORAGE__MEDIA__S3__USE_SSL
          value: "true"
        - name: AUTHENTIK_STORAGE__MEDIA__S3__SECURE_URLS
          value: "true"
      envFrom:
        - secretRef:
            name: &secret authentik-secret
        - secretRef:
            name: postgres-authentik-secret
        - secretRef:
            name: authentik-blueprint-secrets
    authentik:
      postgresql:
        host: postgres-authentik-pooler.security.svc.cluster.local
        port: 5432
      email:
        port: 587
        use_tls: true
    server:
      autoscaling: &autoscaling
        enabled: true
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 60
        behavior:
          scaleUp:
            stabilizationWindowSeconds: 300
          scaleDown:
            stabilizationWindowSeconds: 300
      resources:
        requests:
          cpu: 300m
        limits:
          memory: 1Gi
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
    worker:
      autoscaling: *autoscaling
      resources:
        requests:
          cpu: 300m
        limits:
          memory: 1Gi
    geoip:
      enabled: true
      existingSecret:
        secretName: *secret
        accountId: "AUTHENTIK_GEOIP_ACCOUNT_ID"
        licenseKey: "AUTHENTIK_GEOIP_LICENSE_KEY"
    prometheus:
      rules:
        enabled: true
  valuesFrom:
    - targetPath: authentik.email.host
      kind: Secret
      name: *secret
      valuesKey: EMAIL_SERVER
    - targetPath: authentik.email.username
      kind: Secret
      name: *secret
      valuesKey: EMAIL_USER
    - targetPath: authentik.email.from
      kind: Secret
      name: *secret
      valuesKey: EMAIL_FROM
    - targetPath: authentik.email.password
      kind: Secret
      name: *secret
      valuesKey: EMAIL_PASS
