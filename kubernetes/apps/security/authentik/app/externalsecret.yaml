---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authentik-secret
    template:
      data:
        # Authentik bootstrap — remove after initial setup
        AUTHENTIK_BOOTSTRAP_EMAIL: "{{ .AUTHENTIK_BOOTSTRAP_EMAIL }}"
        AUTHENTIK_BOOTSTRAP_PASSWORD: "{{ .AUTHENTIK_BOOTSTRAP_PASSWORD }}"
        AUTHENTIK_SECRET_KEY: "{{ .AUTHENTIK_SECRET_KEY }}"
        # Email now goes via the in-cluster relay (no creds) — see helmrelease authentik.email
        # Media S3 settings
        AUTHENTIK_STORAGE__MEDIA__S3__ENDPOINT: "https://{{ .S3_ENDPOINT }}"
        AUTHENTIK_STORAGE__MEDIA__S3__REGION: "{{ .S3_REGION }}"
        AUTHENTIK_STORAGE__MEDIA__S3__ACCESS_KEY: "{{ .S3_ACCESS_KEY }}"
        AUTHENTIK_STORAGE__MEDIA__S3__SECRET_KEY: "{{ .S3_SECRET_KEY }}"
        AUTHENTIK_STORAGE__MEDIA__S3__BUCKET_NAME: "{{ .S3_BUCKET_NAME }}"
        AUTHENTIK_STORAGE__MEDIA__S3__CUSTOM_DOMAIN: "auth-media.materia.wtf"
        # GeoIP settings
        AUTHENTIK_GEOIP_ACCOUNT_ID: "{{ .AUTHENTIK_GEOIP_ACCOUNT_ID }}"
        AUTHENTIK_GEOIP_LICENSE_KEY: "{{ .AUTHENTIK_GEOIP_LICENSE_KEY }}"
  dataFrom:
    - extract:
        key: authentik
