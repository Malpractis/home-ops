---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
# OIDC client credentials for the Flux Operator web UI. Pulled from the
# 1Password 'flux-operator' item (client-id / client-secret) and injected into
# the chart values via the HelmRelease's valuesFrom+targetPath, so the secret
# never appears in git. The same client-id/secret back the Authentik OIDC
# provider (via authentik-blueprint-secrets -> FLUX_CLIENT_ID/SECRET).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flux-web-client
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: flux-web-client
  dataFrom:
    - extract:
        key: flux-operator
