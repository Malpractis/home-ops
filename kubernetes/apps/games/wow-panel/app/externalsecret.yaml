---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wow-panel
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: wow-panel-secret
  data:
    # All from the single `azerothcore` 1Password item (one item per app).
    # SOAP GM account (shared with the WP9 bootstrap jobs) — GM-level, so it
    # only ever reaches the panel's server-side env, never the browser.
    - secretKey: SOAP_PASSWORD
      remoteRef:
        key: azerothcore
        property: soap-password
    - secretKey: SOAP_USERNAME
      remoteRef:
        key: azerothcore
        property: soap-username
