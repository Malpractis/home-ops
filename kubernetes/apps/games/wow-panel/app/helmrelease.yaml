---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wow-panel
spec:
  chartRef:
    kind: OCIRepository
    name: wow-panel
  interval: 1h
  values:
    global:
      # The SA is owned by rbac.yaml (with its RBAC-spec'd Role/RoleBinding);
      # without this the chart would render a conflicting default SA.
      createDefaultServiceAccount: false
    controllers:
      wow-panel:
        annotations:
          reloader.stakater.com/auto: "true"
        # The idle auto-scale-down loop is an in-memory singleton — exactly one
        # replica, always (see wow-panel README).
        replicas: 1
        # RollingUpdate would briefly run two pods — two idle loops — on every
        # deploy. Recreate keeps the singleton airtight; the ~seconds gap on a
        # rollout is invisible for a panel nobody watches continuously.
        strategy: Recreate
        serviceAccount:
          name: wow-panel
        containers:
          app:
            nameOverride: "{{ .Release.Name }}"
            image:
              # Rolling :latest, digest-pinned so Renovate PRs each new build.
              repository: ghcr.io/materia-ops/wow-panel
              tag: 1.12.0@sha256:18ae839180c78562beb4b3781e022d92fcd566a8b9395b77bd3bc53d1b8cf41e
            env:
              # Read-only game-DB access for the /bot-roster page (the acore
              # app user; AC_DB_PASSWORD arrives via wow-panel-secret). Unset
              # host = the page degrades to an explanatory card.
              # /my-characters ownership beyond the automatic case-insensitive
              # "game account == Authentik username" match (kitty↔KITTY needs
              # nothing): vince's game account predates the SSO naming.
              ACCOUNT_OWNERS: "vince:MALPRACTIS"
              AC_DB_HOST: azerothcore-db.games.svc.cluster.local
              AC_DB_PORT: "3306"
              AC_DB_USER: acore
              AUTH_DEPLOY: azerothcore-authserver
              # Idle auto-scale-down (docs/wow-server 04-parameters.md):
              # IDLE_SCALEDOWN_ENABLED=false is the single kill switch.
              IDLE_SCALEDOWN_ENABLED: "true"
              IDLE_SCALEDOWN_HOURS: "3"
              NAMESPACE: games
              # Display-only: the model mod-ollama-chat is configured to use
              # (an actual runtime switch is GitOps-owned — WP7 ConfigMap).
              OLLAMA_MODEL: llama3.1:8b-instruct-q4_K_M
              # Partner's PC. Pods resolve *.internal via CoreDNS's dedicated
              # `internal` zone (forwards to the Pi-holes). Until the owner
              # creates the record + static lease this just shows a red dot.
              OLLAMA_URL: http://kiterium.internal:11434
              SOAP_HOST: azerothcore-soap.games.svc.cluster.local
              SOAP_PORT: "7878"
              TZ: Australia/Melbourne
              WORLD_DEPLOY: azerothcore-worldserver
            envFrom:
              - secretRef:
                  name: wow-panel-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz
                    port: 3000
                  periodSeconds: 30
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz
                    port: 3000
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      # The in-cluster ServiceAccount token is how the panel scales the game
      # Deployments; the SA itself has automount disabled (rbac.yaml) so only
      # this pod carries it.
      automountServiceAccountToken: true
      imagePullSecrets:
        - name: ghcr-pull-secret
      # The panel is the realm's control plane — most needed exactly when the
      # cluster is under pressure. Never preempts (see priorityclass.yaml).
      priorityClassName: wow-panel
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        # In-cluster uptime check on the SSO-free probe endpoint. The route's
        # auto-generated gatus entry is only the internal-gateway DNS exposure
        # guard (wow.materia.wtf must NOT resolve publicly) — without this the
        # pod itself has no uptime monitoring. group: services lands it in the
        # existing GatusEndpointDown alert.
        annotations:
          gatus.home-operations.com/enabled: "true"
          gatus.home-operations.com/endpoint: |-
            group: services
            url: http://wow-panel.games.svc:80/api/healthz
            conditions: ["[STATUS] == 200", "[BODY].ok == true"]
        ports:
          http:
            port: 80
            targetPort: 3000
    route:
      app:
        # PANEL_HOST — SSO-walled by the authentik-forward-auth component
        # wired in ks.yaml (SecurityPolicy targets this route).
        hostnames:
          - wow.materia.wtf
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      # Next.js standalone needs these two writable paths with the read-only
      # rootfs.
      cache:
        type: emptyDir
        globalMounts:
          - path: /app/.next/cache
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
