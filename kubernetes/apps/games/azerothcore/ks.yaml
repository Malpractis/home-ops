---
# yaml-language-server: $schema=https://schemas.materia.wtf/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app azerothcore
spec:
  dependsOn:
    # worldserver mounts the client-data PVC read-only; the WP2 extraction Job
    # is one-shot/manual and long gone — sequential RWO use is guaranteed.
    - name: azerothcore-client-data
      namespace: games
    # auth/world connect at boot; DSN secret templating also assumes the DB
    # app's 1Password item exists.
    - name: azerothcore-db
      namespace: games
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/games/azerothcore/app
  postBuild:
    substitute:
      APP: *app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: games
  wait: false
