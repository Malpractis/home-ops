[worldserver]

########################################
# mod-account-achievements
########################################

# Enable account-wide achievement sharing.
Account.Achievements.Enable = 1

# Announce the module to the player on login. Disabled here to avoid
# login-chat spam.
Account.Achievements.Announce = 0

# Comma-separated achievement IDs to exclude from account-wide sharing.
Account.Achievements.Excluded = 0
