[worldserver]

########################################
# mod-cfbg (Cross-Faction Battlegrounds)
########################################

# Enable mixed Alliance/Horde teams in battlegrounds.
CFBG.Enable = 1

# Cross-faction queue for Wintergrasp (Battlefield).
CFBG.Battlefield.Enable = 1
CFBG.Battlefield.TeamLock.Enable = 1
CFBG.Battlefield.NativePriority.Enable = 1
CFBG.Battlefield.ReapplyOnResurrect.Enable = 1
CFBG.Battlefield.SkipClasses = ""

# Team-balancing.
CFBG.Include.Avg.Ilvl.Enable = 0
CFBG.BalancedTeams = 1
CFBG.BalancedTeams.Class.LowLevel = 0
CFBG.BalancedTeams.Class.MinLevel = 10
CFBG.BalancedTeams.Class.MaxLevel = 19
CFBG.BalancedTeams.Class.LevelDiff = 2

# Max party size allowed to queue together. Raise (e.g. 5) if you want a full
# friends+bots premade to queue as one group.
CFBG.Players.Count.In.Group = 3

CFBG.EvenTeams.Enabled = 0
CFBG.EvenTeams.MaxPlayersThreshold = 0

# Randomise race when a player is morphed to the opposite faction.
CFBG.RandomRaceSelection = 1

CFBG.BalanceTeamsOnEntry.Enabled = 1
CFBG.BalanceTeamsAtStart.Enabled = 1
