[worldserver]

########################################
# mod-aoe-loot configuration
########################################

# AOELoot.Enable
#     Description: Enable the AoE loot module (loot every nearby corpse from one).
#     Default:     1 (enabled)
AOELoot.Enable = 1

# AOELoot.Group
#     Description: Allow AoE loot while in a group (respects the group loot method).
#     Default:     1 (enabled)
AOELoot.Group = 1

# AOELoot.Message
#     Description: Show a module notice to the player on login.
#     Default:     1 (enabled) — disabled here to avoid login-chat spam.
AOELoot.Message = 0

# AOELoot.Range
#     Description: Maximum reach (yards) to pull loot from surrounding corpses.
#                  Module default is 55.0; tightened to 30 so a single loot
#                  doesn't vacuum an entire field of randombot kills.
#     Range:       5.0 - 100.0
AOELoot.Range = 30.0
