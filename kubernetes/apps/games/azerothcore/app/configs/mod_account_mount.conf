[worldserver]

########################################
# mod-account-mounts configuration
########################################

# Account.Mounts.Enable
#     Description: Share learned mounts across all characters of an account.
#     Default:     1 (enabled)
Account.Mounts.Enable = 1

# Account.Mounts.Announce
#     Description: Announce the module to the player on login. Disabled here to
#                  avoid login-chat spam (module default is 1).
Account.Mounts.Announce = 0

# Account.Mounts.ExcludedSpellIDs
#     Description: Mount spell IDs excluded from account-wide sharing
#                  (comma-separated, no spaces). 0 = none.
Account.Mounts.ExcludedSpellIDs = 0

# Account.Mounts.LimitRace
#     Description: Enforce race/class restrictions on shared mounts.
#                  0 = any character may own other racial/class-specific mounts.
Account.Mounts.LimitRace = 0
