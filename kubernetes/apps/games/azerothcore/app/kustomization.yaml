---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./grafanadashboard.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  - ./prometheusrule.yaml
configMapGenerator:
  - name: azerothcore-config
    files:
      - ./configs/authserver.conf
      - ./configs/CFBG.conf
      - ./configs/mod_account_mount.conf
      - ./configs/mod_achievements.conf
      - ./configs/mod_ahbot.conf
      - ./configs/mod_ale.conf
      - ./configs/mod_aoe_loot.conf
      - ./configs/mod_ollama_chat.conf
      - ./configs/MultiBotBridge.conf
      - ./configs/playerbots.conf
      - ./configs/transmog.conf
      - ./configs/worldserver.conf
  # Mounted at ALE.ScriptPath; add future .lua files here.
  - name: azerothcore-lua-scripts
    files:
      - ./lua_scripts/README.md
      - ./lua_scripts/wwi-tyraels-hilt.lua
  # Lifecycle-hook + probe scripts (worldserver preStop restart warning,
  # SOAP liveness). The substitute:disabled annotation below is load-bearing
  # here: the scripts use bash ${...} that strict envsubst would otherwise
  # mangle.
  - name: azerothcore-scripts
    files:
      - ./scripts/liveness-soap.sh
      - ./scripts/prestop-restart-warning.sh
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
