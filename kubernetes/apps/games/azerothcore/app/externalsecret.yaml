---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: azerothcore
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: azerothcore-secret
    template:
      data:
        # worldserver: CharacterDatabaseInfo
        AC_CHARACTER_DATABASE_INFO: "azerothcore-db.games.svc.cluster.local;3306;acore;{{ .ACORE_PASSWORD }};acore_characters"
        # authserver + worldserver: LoginDatabaseInfo
        AC_LOGIN_DATABASE_INFO: "azerothcore-db.games.svc.cluster.local;3306;acore;{{ .ACORE_PASSWORD }};acore_auth"
        # worldserver (mod-playerbots, playerbots.conf): PlayerbotsDatabaseInfo
        AC_PLAYERBOTS_DATABASE_INFO: "azerothcore-db.games.svc.cluster.local;3306;acore;{{ .ACORE_PASSWORD }};acore_playerbots"
        # worldserver: WorldDatabaseInfo
        AC_WORLD_DATABASE_INFO: "azerothcore-db.games.svc.cluster.local;3306;acore;{{ .ACORE_PASSWORD }};acore_world"
  data:
    # acore application user password (from the single `azerothcore` item)
    - secretKey: ACORE_PASSWORD
      remoteRef:
        key: azerothcore
        property: acore-password
