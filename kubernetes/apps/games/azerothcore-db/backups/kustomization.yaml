---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./ocirepository.yaml
configMapGenerator:
  - name: azerothcore-db-backup-scripts
    files:
      - ./config/backup-main.sh
      - ./config/backup-world.sh
generatorOptions:
  disableNameSuffixHash: true
