---
# yaml-language-server: $schema=https://schemas.materia.wtf/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app azerothcore-db
spec:
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/games/azerothcore-db/app
  postBuild:
    substitute:
      APP: *app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: games
  wait: false
---
# yaml-language-server: $schema=https://schemas.materia.wtf/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app azerothcore-db-backups
spec:
  components:
    - ../../../../components/volsync
  dependsOn:
    # dump CronJobs read the DB credentials secret created by azerothcore-db
    - name: azerothcore-db
      namespace: games
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/games/azerothcore-db/backups
  postBuild:
    substitute:
      APP: *app
      # Kopia snapshot of the dump PVC, daily after both dump schedules have run
      # (nightly 03:00 + weekly Sun 04:00) so dumps also leave the PVC.
      VOLSYNC_CAPACITY: 20Gi
      VOLSYNC_SCHEDULE: "30 4 * * *"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: games
  wait: false
