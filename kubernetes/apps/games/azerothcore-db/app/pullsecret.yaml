---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
# GHCR pull credentials for the private ghcr.io/materia-ops/* images
# (azerothcore-wotlk-playerbots dbimport Job here; auth/world servers in WP4).
# 1Password item `ghcr-pull` needs: username (GitHub user) + token (PAT,
# read:packages) with access to the materia-ops org packages. The PAT is
# owned by the personal `malpractis` account (still exists); it just needs
# read access to the materia-ops packages.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ghcr-pull-secret
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >
          {"auths":{"ghcr.io":{"username":"{{ .username }}","password":"{{ .token }}",
          "auth":"{{ printf "%s:%s" .username .token | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: ghcr-pull
        property: username
    - secretKey: token
      remoteRef:
        key: ghcr-pull
        property: token
