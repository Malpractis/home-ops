---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  - ./priorityclass.yaml
  - ./prometheusrule.yaml
  - ./pullsecret.yaml
  - ./servicemonitor.yaml
configMapGenerator:
  - name: azerothcore-db-config
    files:
      - ./config/init-databases.sh
      - ./config/my.cnf
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    # the shell scripts' ${VAR}s are runtime values, not Flux substitutions
    kustomize.toolkit.fluxcd.io/substitute: disabled
