---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: azerothcore-db
spec:
  chartRef:
    kind: OCIRepository
    name: azerothcore-db
  interval: 1h
  values:
    controllers:
      azerothcore-db:
        annotations:
          reloader.stakater.com/auto: "true"
        type: statefulset
        replicas: 1
        statefulset:
          volumeClaimTemplates:
            - name: data
              accessMode: ReadWriteOnce
              size: 20Gi
              storageClass: ceph-block
              globalMounts:
                - path: /var/lib/mysql
        containers:
          app:
            nameOverride: "{{ .Release.Name }}"
            image:
              repository: docker.io/library/mysql
              tag: 8.4@sha256:c831a0f11348d402b43d77453e17d770be2eef356615a2823fe0f5a0d6c8b9af
            env:
              # Consumed by config/init-databases.sh on first datadir init to
              # create the acore application user.
              ACORE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: azerothcore-db-secret
                    key: ACORE_PASSWORD
              MYSQL_ROOT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: azerothcore-db-secret
                    key: MYSQL_ROOT_PASSWORD
              TZ: Australia/Melbourne
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" --silent
                  periodSeconds: 30
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" --silent
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 2Gi
          exporter:
            image:
              repository: docker.io/prom/mysqld-exporter
              tag: v0.19.0@sha256:eacb4b18e2ec1e0abdf2d64851b68526c964f6d9cb3e9458fb5d5f5062ea94c1
            args:
              - --mysqld.address=127.0.0.1:3306
              - --mysqld.username=root
            env:
              # Root because the init script only runs on first datadir init —
              # a dedicated exporter user would need a manual SQL step on the
              # live DB. Same-pod loopback only; the secret never leaves the
              # pod spec it already lives in.
              MYSQLD_EXPORTER_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: azerothcore-db-secret
                    key: MYSQL_ROOT_PASSWORD
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      priorityClassName: azerothcore-critical
      securityContext:
        runAsNonRoot: true
        # The official mysql image runs as uid 999 (mysql), not the home-ops
        # default 1000; fight the image and initdb fails on the datadir.
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: azerothcore-db
        ports:
          metrics:
            port: 9104
          mysql:
            port: 3306
    persistence:
      config:
        type: configMap
        name: azerothcore-db-config
        globalMounts:
          # Sourced by the entrypoint ONLY when the datadir is empty (first boot).
          - path: /docker-entrypoint-initdb.d/init-databases.sh
            subPath: init-databases.sh
            readOnly: true
          - path: /etc/mysql/conf.d/zz-homeops.cnf
            subPath: my.cnf
            readOnly: true
      run-mysqld:
        type: emptyDir
        globalMounts:
          # mysqld's unix socket; required with readOnlyRootFilesystem
          - path: /var/run/mysqld
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
