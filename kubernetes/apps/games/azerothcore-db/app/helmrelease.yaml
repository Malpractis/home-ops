---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: azerothcore-db
spec:
  chartRef:
    kind: OCIRepository
    name: azerothcore-db
  interval: 1h
  values:
    controllers:
      azerothcore-db:
        annotations:
          reloader.stakater.com/auto: "true"
        type: statefulset
        replicas: 1
        pod:
          # Budget = preStop hook (20s SOAP saveall + 15s async-save flush,
          # see config/prestop-saveall.sh) + mysqld's own SIGTERM shutdown.
          # The 30s default risks SIGKILLing mysqld mid-flush.
          terminationGracePeriodSeconds: 120
        statefulset:
          volumeClaimTemplates:
            - name: data
              accessMode: ReadWriteOnce
              size: 20Gi
              storageClass: ceph-block
              globalMounts:
                - path: /var/lib/mysql
        initContainers:
          # Data-loss guard (review WR#2): refuse to boot on a datadir with no
          # initialised MySQL system schema unless a fresh init is explicitly
          # authorised in git. An unexpectedly blank /var/lib/mysql (the ceph-csi
          # stale-staging fault this cluster has hit) would otherwise let mysqld
          # silently re-create empty acore_* DBs — which mysqladmin-ping probes
          # never notice and the nightly backup then dumps and prunes over the
          # good ones.
          01-init-guard:
            image:
              repository: docker.io/library/mysql
              tag: 8.4@sha256:c592c15aaf4a1961e15d82eb31ea5987dda862d1c4b1e93424438c0e91dc1f8d
            env:
              # Set to "true" in git ONLY for a deliberate first install, then
              # revert once the datadir is populated. Any other value refuses an
              # empty datadir.
              ALLOW_FRESH_INIT: "false"
            command:
              - /bin/bash
              - -c
              - |
                set -euo pipefail
                if [ -d /var/lib/mysql/mysql ]; then
                  echo "[init-guard] datadir initialised — proceeding"
                  exit 0
                fi
                if [ "${ALLOW_FRESH_INIT:-false}" = "true" ]; then
                  echo "[init-guard] ALLOW_FRESH_INIT=true — permitting fresh init"
                  exit 0
                fi
                echo "[init-guard] REFUSING: /var/lib/mysql has no initialised MySQL system schema" >&2
                echo "[init-guard] and ALLOW_FRESH_INIT is not 'true'. An unexpectedly empty datadir" >&2
                echo "[init-guard] usually means a volume/staging fault, not a real first install." >&2
                echo "[init-guard] If this genuinely is a first install, set ALLOW_FRESH_INIT=true in git." >&2
                exit 1
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
        containers:
          app:
            nameOverride: "{{ .Release.Name }}"
            image:
              repository: docker.io/library/mysql
              tag: 8.4@sha256:c592c15aaf4a1961e15d82eb31ea5987dda862d1c4b1e93424438c0e91dc1f8d
            env:
              # Consumed by config/init-databases.sh on first datadir init to
              # create the acore application user.
              ACORE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: azerothcore-db-secret
                    key: ACORE_PASSWORD
              MYSQL_ROOT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: azerothcore-db-secret
                    key: MYSQL_ROOT_PASSWORD
              # preStop hook's SOAP login (config/prestop-saveall.sh)
              SOAP_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: azerothcore-db-secret
                    key: SOAP_PASSWORD
              SOAP_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: azerothcore-db-secret
                    key: SOAP_USERNAME
              TZ: Australia/Melbourne
            # Flush worldserver state to the DB before mysqld goes down — an
            # orchestrated DB roll must never rewind the realm to the last
            # periodic save.
            lifecycle:
              preStop:
                exec:
                  command: ["/bin/bash", "/scripts/prestop-saveall.sh"]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" --silent
                  periodSeconds: 30
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" --silent
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 2Gi
          exporter:
            image:
              repository: docker.io/prom/mysqld-exporter
              tag: v0.19.0@sha256:eacb4b18e2ec1e0abdf2d64851b68526c964f6d9cb3e9458fb5d5f5062ea94c1
            args:
              - --mysqld.address=127.0.0.1:3306
              - --mysqld.username=root
            env:
              # Root because the init script only runs on first datadir init —
              # a dedicated exporter user would need a manual SQL step on the
              # live DB. Same-pod loopback only; the secret never leaves the
              # pod spec it already lives in.
              MYSQLD_EXPORTER_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: azerothcore-db-secret
                    key: MYSQL_ROOT_PASSWORD
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      priorityClassName: azerothcore-critical
      securityContext:
        runAsNonRoot: true
        # The official mysql image runs as uid 999 (mysql), not the home-ops
        # default 1000; fight the image and initdb fails on the datadir.
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: azerothcore-db
        ports:
          metrics:
            port: 9104
          mysql:
            port: 3306
    persistence:
      config:
        type: configMap
        name: azerothcore-db-config
        globalMounts:
          # Sourced by the entrypoint ONLY when the datadir is empty (first boot).
          - path: /docker-entrypoint-initdb.d/init-databases.sh
            subPath: init-databases.sh
            readOnly: true
          - path: /etc/mysql/conf.d/zz-homeops.cnf
            subPath: my.cnf
            readOnly: true
          - path: /scripts/prestop-saveall.sh
            subPath: prestop-saveall.sh
            readOnly: true
      run-mysqld:
        type: emptyDir
        globalMounts:
          # mysqld's unix socket; required with readOnlyRootFilesystem
          - path: /var/run/mysqld
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
