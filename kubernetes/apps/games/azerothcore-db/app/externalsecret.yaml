---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: azerothcore-db
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: azerothcore-db-secret
  data:
    # acore application user password (worldserver/authserver/dbimport/dumps).
    # Generate WITHOUT quotes/backslashes/semicolons: it is interpolated into
    # SQL by init-databases.sh and into dbimport connection strings.
    - secretKey: ACORE_PASSWORD
      remoteRef:
        key: azerothcore-db
        property: acore-password
    # MySQL root password (init, probes, admin exec)
    - secretKey: MYSQL_ROOT_PASSWORD
      remoteRef:
        key: azerothcore-db
        property: root-password
