---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns
spec:
  chartRef:
    kind: OCIRepository
    name: coredns
  interval: 1h
  values:
    fullnameOverride: coredns
    image:
      repository: mirror.gcr.io/coredns/coredns
    k8sAppLabelOverride: kube-dns
    serviceAccount:
      create: true
    service:
      name: kube-dns
      clusterIP: 10.43.0.10
    replicaCount: 2
    servers:
      # Local split-horizon names (*.internal) and LAN reverse DNS stay on the
      # Pi-holes — they hold those records; NextDNS doesn't.
      - zones:
          - zone: internal
            scheme: dns://
          - zone: 168.192.in-addr.arpa
            scheme: dns://
        port: 53
        plugins:
          - name: errors
          - name: cache
            parameters: "30"
          - name: forward
            parameters: . 192.168.1.2 192.168.20.2
          - name: loop
          - name: reload
      # Cluster (cluster.local) + everything else. External queries go to the
      # in-cluster dnscrypt VIP, which uses the dedicated NextDNS "kubernetes"
      # profile — separate from the home profile the Pi-holes use.
      - zones:
          - zone: .
            scheme: dns://
            use_tcp: true
        port: 53
        plugins:
          - name: errors
          - name: health
            configBlock: |-
              lameduck 5s
          - name: ready
          - name: kubernetes
            parameters: cluster.local in-addr.arpa ip6.arpa
            configBlock: |-
              pods verified
              fallthrough in-addr.arpa ip6.arpa
          # autopath @kubernetes is deliberately ABSENT. It answers a pod's
          # search-suffixed query (api.github.com.<ns>.svc.cluster.local.)
          # with the public record server-side, so Cilium's DNS proxy keys
          # the IP to the suffixed name — which never matches a toFQDNs
          # matchName — and every packet to that IP is policy-dropped. This
          # took down the ARC listeners on 2026-07-18 (actions-runner-egress
          # policy). Known Cilium incompatibility; the cost of living
          # without it is a few cached NXDOMAIN round-trips per first lookup.
          - name: forward
            parameters: . 192.168.10.2
          - name: cache
            configBlock: |-
              prefetch 20
              serve_stale
          - name: loop
          - name: reload
          - name: loadbalance
          - name: prometheus
            parameters: 0.0.0.0:9153
          - name: log
            configBlock: |-
              class error
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
