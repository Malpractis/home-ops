---
# yaml-language-server: $schema=https://schemas.materia.wtf/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drm-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: drm-exporter
  interval: 1h
  values:
    dra:
      enabled: true
      deviceClassName: gpu.intel.com
    # Pin to nodes with an Intel iGPU (c2/c3); the VM node has no GPU to claim
    nodeSelector:
      intel.feature.node.kubernetes.io/gpu: "true"
    securityContext:
      capabilities:
        add:
          - PERFMON
    monitoring:
      serviceMonitor:
        enabled: true
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 128Mi
