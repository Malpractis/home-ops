# yaml-language-server: $schema=https://schemas.materia.wtf/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crd-schema-publisher
spec:
  dependsOn:
    - name: prometheus-operator-crds
      namespace: o11y
    - name: grafana
      namespace: o11y
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: crd-schema-publisher
      namespace: kube-system
  interval: 30m
  path: ./kubernetes/apps/kube-system/crd-schema-publisher/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-system
  wait: true
