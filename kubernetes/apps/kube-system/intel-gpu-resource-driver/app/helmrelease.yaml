---
# yaml-language-server: $schema=https://schemas.materia.wtf/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-gpu-resource-driver
spec:
  chartRef:
    kind: OCIRepository
    name: intel-gpu-resource-driver
  interval: 1h
  values:
    cdi:
      staticPath: /run/cdi
      dynamicPath: /run/cdi
    kubeletPlugin:
      privileged: true
      healthMonitoring:
        enabled: false
    nfd:
      enabled: true
      nameOverride: intel-gpu-nfd
      enableNodeFeatureApi: true
    nodeFeatureRules:
      enabled: true
