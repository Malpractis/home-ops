---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: etcd-defrag
spec:
  chartRef:
    kind: OCIRepository
    name: etcd-defrag
  interval: 1h
  values:
    defaultPodOptions:
      # hostNetwork so 127.0.0.1:2379 is the node-local etcd, and the member
      # list resolves to reachable peer addresses on the node network.
      hostNetwork: true
      securityContext:
        runAsGroup: 0
        runAsNonRoot: false
        runAsUser: 0
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    controllers:
      etcd-defrag:
        type: cronjob
        cronjob:
          schedule: "0 3 * * 0"
          timeZone: Australia/Melbourne
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          successfulJobsHistory: 1
        pod:
          restartPolicy: Never
        containers:
          app:
            image:
              repository: ghcr.io/ahrtr/etcd-defrag
              tag: v0.42.0@sha256:5138a12eda39067dabcf1d420d66f54f29f1e9297109a6b36574e010b45d58cc
            args:
              - --endpoints=https://127.0.0.1:2379
              - --cluster
              - --cacert=/certs/ca.crt
              - --cert=/certs/server.crt
              - --key=/certs/server.key
              # Only defrag when it's worth a member pause: >50% of quota used
              # or >100MiB reclaimable.
              - --defrag-rule=dbQuotaUsage > 0.5 || dbSizeFree > 100*1024*1024
              - --move-leader
              - --wait-between-defrags=30s
              # Talos default quota-backend-bytes (2GiB) — keep in sync with
              # cluster.etcd.extraArgs if that is ever overridden.
              - --etcd-storage-quota-bytes=2147483648
              - --auto-disalarm
              - --disalarm-threshold=0.8
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 128Mi
            securityContext:
              # Required to read the root-owned etcd client certs from the
              # Talos hostPath below.
              privileged: true

    persistence:
      certs:
        type: hostPath
        hostPath: /system/secrets/etcd
        globalMounts:
          - path: /certs
            readOnly: true
