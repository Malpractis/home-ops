---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: internal-pikvm
  namespace: network
  labels:
    kubernetes.io/service-name: internal-pikvm
addressType: IPv4
endpoints:
  - addresses:
      - "${TRUENAS_IP:=192.168.20.22}"
ports:
  - port: 443
    name: https
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: internal-pikvm
  namespace: network
spec:
  type: ClusterIP
  clusterIP: None # Headless service for the EndpointSlice
  ports:
    - port: 443
      targetPort: 443
      name: https
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: external-service-tlsroute-pikvm
  namespace: network
  annotations:
    external-dns.alpha.kubernetes.io/target: "internal-tls.${SECRET_DOMAIN:=flux.local}"
spec:
  parentRefs:
    - name: envoy-internal-tls
      namespace: network
      sectionName: tls
  hostnames:
    - "nas.${SECRET_DOMAIN:=flux.local}"
  rules:
    - backendRefs:
        - name: internal-pikvm
          port: 443
