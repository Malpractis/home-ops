---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: internal-garage
  namespace: network
  labels:
    kubernetes.io/service-name: internal-garage
addressType: IPv4
endpoints:
  - addresses:
      - 192.168.20.30
ports:
  - port: 80
    name: http
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: internal-garage
  namespace: network
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 80
      targetPort: 80
      name: http
---
# yaml-language-server: $schema=https://schemas.materia.wtf/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: external-service-httproute-garage
  namespace: network
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - garage.materia.wtf
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: internal-garage
          port: 80
