---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dnscrypt-proxy
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: dnscrypt-proxy-secret
    template:
      data:
        dnscrypt-proxy.toml: |
          ##############################################
          #        dnscrypt-proxy configuration        #
          #   Design: NextDNS is the filtering layer   #
          #   Pihole = local records / cache only      #
          ##############################################

          # --- Upstream servers (pinned) ---
          # Name must match the [static] entry at the bottom of this file.
          server_names = ['nextdns']

          # --- Listening ---
          listen_addresses = ['0.0.0.0:53']
          max_clients = 250

          # --- Protocol selection ---
          ipv4_servers = true
          ipv6_servers = false    # WAN has no working IPv6 yet
          dnscrypt_servers = true
          doh_servers = true
          odoh_servers = false

          # --- Server requirements ---
          # NOTE: require_dnssec/nolog/nofilter only filter servers auto-selected
          # from [sources]. We pin a static server (below) and have no [sources],
          # so they are inert and omitted. DNSSEC + no-log/no-filter policy is the
          # upstream resolver's responsibility (NextDNS).
          disabled_server_names = []

          # --- Transport ---
          force_tcp = false
          http3 = true
          timeout = 5000
          keepalive = 30
          cert_refresh_delay = 240

          # --- Bootstrap / connectivity ---
          bootstrap_resolvers = ['9.9.9.9:53', '1.1.1.1:53']
          ignore_system_dns = true
          netprobe_timeout = 60
          netprobe_address = '9.9.9.9:53'

          # --- Logging ---
          log_files_max_size = 10
          log_files_max_age = 7
          log_files_max_backups = 1

          # --- Local short-circuit filters ---
          block_ipv6 = false
          block_unqualified = true
          block_undelegated = true
          reject_ttl = 10

          # --- Cache (small smoothing buffer; Pihole is the primary cache) ---
          cache = true
          cache_size = 4096
          cache_min_ttl = 60      # respect NextDNS/upstream TTLs; 60s floor only
          cache_max_ttl = 86400
          cache_neg_min_ttl = 60
          cache_neg_max_ttl = 600

          [query_log]
          file = '/dev/stdout'    # surface queries in `kubectl logs` for debugging
          format = 'tsv'

          [nx_log]
          file = '/dev/stdout'
          format = 'tsv'

          # No [sources]: only a static server is pinned, so dnscrypt-proxy needs
          # no public-resolvers list. Removes a GitHub startup dependency + the
          # recurring list fetch/disk write (matters with readOnlyRootFilesystem).

          # --- Static, pinned server (stamp injected from 1Password) ---
          [static]
          [static.'nextdns']
          stamp = '{{ .nextdns_stamp }}'
  dataFrom:
    - extract:
        key: dnscrypt
