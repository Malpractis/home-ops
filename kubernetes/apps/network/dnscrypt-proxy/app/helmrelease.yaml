---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dnscrypt-proxy
  namespace: network
spec:
  interval: 1h
  # Stateless leaf service (no DB/schema/CRD/datapath state): safe to
  # auto-rollback a failed upgrade. Opts into rollback because the global
  # default is now fail-and-hold (flux/cluster/ks.yaml).
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chartRef:
    kind: OCIRepository
    name: dnscrypt-proxy
  values:
    controllers:
      *app :
        enabled: true
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        labels: {}
        replicas: 3
        strategy: RollingUpdate
        rollingUpdate:
          unavailable: 1
          surge: 1
        containers:
          app:
            nameOverride: *app
            image:
              repository: ghcr.io/klutchell/dnscrypt-proxy
              tag: 2.1.18@sha256:a98e8d13314fa8b75620026441b1d6581e2b55189509a794500c5c86064df810
            probes:
              liveness: &dnscrypt-probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /usr/local/bin/dnsprobe
                      - localhost
                      - "127.0.0.1"
              readiness: *dnscrypt-probes
            resources:
              requests:
                cpu: 25m
              limits:
                memory: 32Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - pihole
                topologyKey: kubernetes.io/hostname
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - dnscrypt-proxy
                topologyKey: kubernetes.io/hostname
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      priorityClassName: system-cluster-critical
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 1.1.1.1
        options:
          - name: ndots
            value: "1"
    service:
      *app :
        type: LoadBalancer
        ipFamilies: [IPv4]
        ipFamilyPolicy: SingleStack
        annotations:
          lbipam.cilium.io/ips: 192.168.10.2
        ports:
          dns-udp:
            primary: false
            port: 53
            protocol: UDP
          dns-tcp:
            primary: false
            port: 53
            protocol: TCP
    persistence:
      config:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /config
      config-file:
        type: secret
        name: dnscrypt-proxy-secret
        advancedMounts:
          *app :
            app:
              - path: /config/dnscrypt-proxy.toml
                subPath: dnscrypt-proxy.toml
                readOnly: true
