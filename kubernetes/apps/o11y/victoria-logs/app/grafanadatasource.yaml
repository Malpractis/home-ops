---
# yaml-language-server: $schema=https://schemas.materia.wtf/grafana.integreatly.org/grafanadatasource_v1beta1.json
# Exposes VictoriaLogs in Grafana (LogsQL explore + logs panels). The operator
# installs the datasource plugin into Grafana's PVC-backed plugins dir, so the
# read-only rootfs is unaffected. The uid is pinned: dashboards reference it
# (e.g. wow-panel-audit).
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: victoria-logs
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  plugins:
    - name: victoriametrics-logs-datasource
      version: 0.29.0
  datasource:
    name: VictoriaLogs
    uid: victorialogs
    type: victoriametrics-logs-datasource
    access: proxy
    url: http://victoria-logs.o11y.svc.cluster.local:9428
    isDefault: false
