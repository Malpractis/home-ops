---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vmalertmanager
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: vmalertmanager-secret
    template:
      data:
        ALERTMANAGER_PUSHOVER_TOKEN: "{{ .ALERTMANAGER_PUSHOVER_TOKEN }}"
        PUSHOVER_USER_KEY: "{{ .PUSHOVER_USER_KEY }}"
        NOTIFIARR_METRICS_KEY: "{{ .NOTIFIARR_METRICS_KEY }}"
  dataFrom:
    - extract:
        key: alertmanager
    - extract:
        key: notifiarr
---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: victoriametrics-notifiarr-scrape
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: victoriametrics-notifiarr-scrape-secret
    template:
      engineVersion: v2
      data:
        notifiarr.yaml: |
          - job_name: notifiarr
            scrape_interval: 60s
            metrics_path: /metrics
            static_configs:
              - targets: ['notifiarr.media.svc.cluster.local:5454']
            headers:
              - "X-Api-Key: {{ .NOTIFIARR_METRICS_KEY }}"
  dataFrom:
    - extract:
        key: notifiarr
