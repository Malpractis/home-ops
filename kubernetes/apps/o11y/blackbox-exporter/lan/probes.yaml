---
# yaml-language-server: $schema=https://schemas.materia.wtf/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: lan-icmp
spec:
  module: icmp
  prober:
    url: blackbox-exporter-lan.o11y.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - nas.internal
        - pikvm.internal
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter-lan
      action: replace
---
# yaml-language-server: $schema=https://schemas.materia.wtf/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: lan-tcp
spec:
  module: tcp_connect
  prober:
    url: blackbox-exporter-lan.o11y.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - nas.internal:2049
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter-lan
      action: replace
    # Relabel job to nfs_probe so prometheus-adapter can expose the metric
    # under the name the zeroscaler HPA component expects. Without this the
    # actual label is "probe/o11y/lan-tcp" and all torrents HPAs are stuck
    # with ScalingActive=False (scale-to-zero on NFS failure never fires).
    - targetLabel: job
      replacement: nfs_probe
      action: replace
