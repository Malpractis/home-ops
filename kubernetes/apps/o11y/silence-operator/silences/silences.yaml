---
# yaml-language-server: $schema=https://schemas.materia.wtf/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: ceph-node-local-diskspace-warning
spec:
  matchers:
    - name: alertname
      value: CephNodeDiskspaceWarning
    - name: device
      value: /dev/sd.*
      matchType: "=~"
---
# yaml-language-server: $schema=https://schemas.materia.wtf/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: ceph-node-nfsmount-diskspace-warning
spec:
  matchers:
    - name: alertname
      value: CephNodeDiskspaceWarning
    - name: mountpoint
      value: /etc/nfsmount.conf
---
# yaml-language-server: $schema=https://schemas.materia.wtf/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: cluster-memory-overcommit
spec:
  matchers:
    - name: alertname
      value: KubeMemoryOvercommit
---
# yaml-language-server: $schema=https://schemas.materia.wtf/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: cpu-throttling-high-info
spec:
  matchers:
    - name: alertname
      value: CPUThrottlingHigh
    - name: severity
      value: info
---
# yaml-language-server: $schema=https://schemas.materia.wtf/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: hpa-maxed-out
spec:
  matchers:
    - name: alertname
      value: KubeHpaMaxedOut
---
# yaml-language-server: $schema=https://schemas.materia.wtf/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: infrastructure-memory-high-utilization
spec:
  matchers:
    - name: alertname
      value: NodeMemoryHighUtilization
    - name: instance
      value: (nas|pve-0).internal:9100
      matchType: "=~"
---
# yaml-language-server: $schema=https://schemas.materia.wtf/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: victoria-metrics-kube-scheduler
spec:
  matchers:
    - name: alertname
      value: RecordingRulesNoData
    - name: recording
      value: cluster_quantile:scheduler_.*
      matchType: "=~"
---
# yaml-language-server: $schema=https://schemas.materia.wtf/observability.giantswarm.io/silence_v1alpha2.json
# These authentik error/exception counters have no series when the system is healthy
# (django-prometheus only emits a series after the first event). This is expected
# behaviour — silence rather than pollute the alert feed with "good news" NoData.
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: authentik-zero-activity-recording-rules
spec:
  matchers:
    - name: alertname
      value: RecordingRulesNoData
    - name: recording
      value: job:(django_db_errors_total|django_db_new_connection_errors_total|django_http_exceptions_total_by_type|django_http_exceptions_total_by_view):.*
      matchType: "=~"
