---
# yaml-language-server: $schema=https://schemas.materia.wtf/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus-sidecar
spec:
  chartRef:
    kind: OCIRepository
    name: gatus-sidecar
  interval: 1h
  values:
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    gatus:
      delayStartSeconds: "5"
      env:
        TZ: Australia/Melbourne
      # ${GATUS_STATUS_TOKEN} for the ci-group checks in config.yaml. optional:
      # gatus still starts (and the checks fail loudly) if the secret is
      # missing; reloader rolls the pod when ESO creates it.
      envFrom:
        - secretRef:
            name: gatus-sidecar-secret
            optional: true
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          # NET_RAW for the icmp:// connectivity checks in config.yaml
          add: ["NET_RAW"]
          drop: ["ALL"]
    sidecar:
      kinds:
        httproute:
          enable: true
          auto: true
        service:
          enable: true
    config:
      existingConfigMap: "{{ .Release.Name }}-configmap"
      items:
        - key: config.yaml
          path: config.yaml
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: "false"
      hostnames:
        - "{{ .Release.Name }}.materia.wtf"
        - status.materia.wtf
      parentRefs:
        # Internal only: the status page exposes the full internal service +
        # health inventory, so it stays on the LAN gateway (no public recon
        # surface). Left open (no forward-auth) per decision.
        - name: envoy-internal
          namespace: network
    monitoring:
      serviceMonitor:
        enabled: true
    persistence:
      enabled: true
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 5Gi
    resources:
      requests:
        cpu: 100m
      limits:
        memory: 512Mi
