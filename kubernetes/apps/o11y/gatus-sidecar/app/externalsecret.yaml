---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gatus-sidecar
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: gatus-sidecar-secret
    template:
      data:
        # ONE fine-grained PAT (resource owner materia-ops — survives repo
        # transfers, unlike user-owned tokens; Actions: Read-only) for every
        # ci-group dead-man check in config.yaml. Watching a new repo =
        # add it to this token's repository scope, nothing else. The field
        # MUST exist on the 1P "gatus" item BEFORE this merges - a missing
        # key fails the whole secret template. If the token dies the checks
        # 401/404 and alert - fail-loud.
        GATUS_STATUS_TOKEN: "{{ .GATUS_STATUS_TOKEN }}"
  dataFrom:
    - extract:
        key: gatus
