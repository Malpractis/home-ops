---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gatus-sidecar
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: gatus-sidecar-secret
    template:
      data:
        # Fine-grained PAT (owner Malpractis, repo AllTheThings-WotLK only,
        # Actions: Read-only) for the release-cron dead-man checks in
        # config.yaml. If it expires the checks 401 and alert - fail-loud.
        ATT_GITHUB_TOKEN: "{{ .ATT_GITHUB_TOKEN }}"
        # Same shape for the materia-core release dead-man check: fine-
        # grained PAT, repo materia-core only, Actions: Read-only. The field
        # MUST exist on the 1P "gatus" item BEFORE this merges - a missing
        # key fails the whole secret template (taking the ATT checks down).
        MATERIA_GITHUB_TOKEN: "{{ .MATERIA_GITHUB_TOKEN }}"
  dataFrom:
    - extract:
        key: gatus
