---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gatus-sidecar
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: gatus-sidecar-secret
    template:
      data:
        # Fine-grained PAT (owner Malpractis, repo AllTheThings-WotLK only,
        # Actions: Read-only) for the release-cron dead-man checks in
        # config.yaml. If it expires the checks 401 and alert - fail-loud.
        ATT_GITHUB_TOKEN: "{{ .ATT_GITHUB_TOKEN }}"
  dataFrom:
    - extract:
        key: gatus
