---
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m
endpoints:
  # Dead-man switch for the ATT release pipeline (AllTheThings-WotLK):
  # pull-based via the GitHub API because Cloudflare Bot Fight Mode would eat
  # a push from GitHub Actions runners. Token: GATUS_STATUS_TOKEN via gatus-sidecar-secret (ESO).
  - name: att-release-cron-enabled
    group: ci
    # state must be "active" - GitHub silently disables scheduled workflows
    # after 60 days without repo activity (state becomes disabled_inactivity)
    url: https://api.github.com/repos/materia-ops/allthethings-wotlk/actions/workflows/upstream-release.yml
    interval: 30m
    headers:
      Authorization: Bearer ${GATUS_STATUS_TOKEN}
    conditions:
      - "[STATUS] == 200"
      - "[BODY].state == active"
  - name: att-release-last-run
    group: ci
    # latest completed run must have succeeded - catches failing releases
    # (incl. expired RELEASES_TOKEN / SIGNING_KEY problems) and check-job
    # failures the repo's own drift-alert job cannot see
    url: "https://api.github.com/repos/materia-ops/allthethings-wotlk/actions/workflows/upstream-release.yml/runs?status=completed&per_page=1"
    interval: 30m
    headers:
      Authorization: Bearer ${GATUS_STATUS_TOKEN}
    conditions:
      - "[STATUS] == 200"
      - "[BODY].workflow_runs[0].conclusion == success"
  # Dead-man for the materia-core release pipeline: the latest completed
  # release.yml run must have succeeded — catches failed installer builds,
  # smoke-test failures, and mirror-publish breakage (SIGNING_KEY /
  # github-bot App problems) that would otherwise silently stop the
  # installed fleet from receiving updates.
  - name: materia-core-release-last-run
    group: ci
    url: "https://api.github.com/repos/materia-ops/materia-core/actions/workflows/release.yml/runs?status=completed&per_page=1"
    interval: 30m
    headers:
      Authorization: Bearer ${GATUS_STATUS_TOKEN}
    conditions:
      - "[STATUS] == 200"
      - "[BODY].workflow_runs[0].conclusion == success"
  - name: Cloudflare
    group: connectivity
    url: icmp://1.1.1.1
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
  - name: Google
    group: connectivity
    url: icmp://8.8.8.8
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
  - name: Quad9
    group: connectivity
    url: icmp://9.9.9.9
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
  # Third-party sources Materia Core (WoW client tooling) pulls from —
  # a failure here explains "check for updates" breaking fleet-wide before
  # anyone reports it. HEAD keeps the multi-GB bucket objects cheap to poll.
  - name: DXVK releases API
    group: upstreams
    url: https://api.github.com/repos/doitsujin/dxvk/releases/latest
    interval: 15m
    conditions:
      - "[STATUS] == 200"
  - name: Lexara (GitHub raw)
    group: upstreams
    url: https://raw.githubusercontent.com/Stormhand-dev/Lexara---HD-Font-Renderer-for-WoW-3.3.5/main/Lexara.zip
    method: HEAD
    interval: 15m
    conditions:
      - "[STATUS] == 200"
  - name: Materia Core latest release assets
    group: upstreams
    # the mirror's latest release must actually carry the installer set
    # (installer, blockmap, latest.yml, checksums, seed stub) — catches a
    # cut release whose asset upload died half-way, which the feed check
    # below can't see. Unauthenticated: 2 req/h against the 60/h/IP limit.
    url: https://api.github.com/repos/materia-ops/materia-core-releases/releases/latest
    interval: 30m
    conditions:
      - "[STATUS] == 200"
      - "len([BODY].assets) >= 5"
  - name: Materia Core update feed
    group: upstreams
    # latest.yml on the PUBLIC mirror repo — the electron-updater feed the
    # installed fleet polls (source repo is private, its assets 404).
    url: https://github.com/materia-ops/materia-core-releases/releases/latest/download/latest.yml
    interval: 15m
    conditions:
      - "[STATUS] == 200"
  - name: Reforged R2 patch bucket
    group: upstreams
    url: "https://pub-0f05631d243e4046993fc02ca7be9542.r2.dev/Wrath%20of%20the%20Lich%20King/patches/patch-A.mpq"
    method: HEAD
    interval: 15m
    conditions:
      - "[STATUS] == 200"
  - name: Vanguard (GitHub raw)
    group: upstreams
    url: https://raw.githubusercontent.com/Stormhand-dev/Vanguard---WotLK-AutoLogin/main/AccountLogin.lua
    method: HEAD
    interval: 15m
    conditions:
      - "[STATUS] == 200"
  - name: WoW Patcher (GitHub raw)
    group: upstreams
    url: https://raw.githubusercontent.com/Stormhand-dev/WoW-3.3.5-Patcher---Project-Reforged/main/Project%20Reforged%20-%20WoW%203.3.5%20Patcher.zip
    method: HEAD
    interval: 15m
    conditions:
      - "[STATUS] == 200"
metrics: true
storage:
  type: sqlite
  caching: true
  path: ${GATUS_CONFIG_PATH}/gatus.db
ui:
  title: Status | Gatus
  header: Status
  logo: https://avatars.githubusercontent.com/u/31232305
  link: https://github.com/materia-ops
  buttons:
    - name: Github
      link: https://github.com/materia-ops
    - name: Homelab
      link: https://github.com/materia-ops/home-ops
web:
  port: ${GATUS_WEB_PORT}
