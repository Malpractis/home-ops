---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: grafana-secret
    template:
      data:
        # Admin User and Password
        GF_SECURITY_ADMIN_USER: "{{ .GRAFANA_ADMIN_USER }}"
        GF_SECURITY_ADMIN_PASSWORD: "{{ .GRAFANA_ADMIN_PASSWORD }}"
        # Authentik OAuth — client ID is static, secret comes from Terraform → 1Password
        GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "{{ .client-id }}"
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "{{ .client-secret }}"
  dataFrom:
    - extract:
        key: grafana
