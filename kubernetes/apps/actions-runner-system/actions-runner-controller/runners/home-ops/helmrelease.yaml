---
# yaml-language-server: $schema=https://schemas.materia.wtf/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name home-ops-runner
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
  interval: 1h
  values:
    githubConfigUrl: https://github.com/materia-ops/home-ops
    githubConfigSecret: home-ops-runner-secret
    # 0: no warm pod holding the Talos os:admin identity between jobs; ARC
    # cold-starts a runner in ~30-60s, fine for the push/dispatch-only load.
    minRunners: 0
    maxRunners: 3
    containerMode:
      type: kubernetes
      kubernetesModeWorkVolumeClaim:
        accessModes:
          - ReadWriteOnce
        storageClassName: openebs-hostpath
        resources:
          requests:
            storage: 25Gi
    controllerServiceAccount:
      name: actions-runner-controller
      namespace: actions-runner-system
    # ndots:1 so external lookups query the bare name first, bypassing the
    # search path. REQUIRED while the actions-runner-egress toFQDNs policy
    # selects these pods: coredns autopath answers suffixed queries with the
    # public record, which Cilium's DNS proxy keys to a name the policy never
    # matches -> silent SYN drops (2026-07-18 listener outage). Applies to the
    # runner pods (template) and the listener (listenerTemplate) alike.
    listenerTemplate:
      spec:
        dnsConfig: &ndots
          options:
            - name: ndots
              value: "1"
        # merge-stub: the CRD requires containers whenever listenerTemplate is
        # set; an entry naming the generated container changes nothing else.
        containers:
          - name: listener
    template:
      spec:
        dnsConfig: *ndots
        containers:
          - name: runner
            image: ghcr.io/home-operations/actions-runner:2.336.0@sha256:281a9a090522fafbf4967f158b8c97d03552b1978b688893c5f7cb1944bc5fe5
            command:
              - /home/runner/run.sh
            env:
              - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
                value: "false"
              - name: NODE
                valueFrom:
                  fieldRef:
                    fieldPath: status.hostIP
            volumeMounts:
              - mountPath: /var/run/secrets/talos.dev
                name: talos
                readOnly: true
        serviceAccountName: *name
        volumes:
          - name: talos
            secret:
              secretName: *name
