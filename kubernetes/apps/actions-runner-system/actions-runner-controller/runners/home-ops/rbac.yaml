---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: home-ops-runner
---
# ARC kubernetes containerMode: the runner spawns its job pods via the API.
# This is the documented permission set for that mode, namespace-scoped —
# the runner needs no other Kubernetes access (CD applies nothing to the
# cluster; Flux pulls from git).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: home-ops-runner
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: home-ops-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: home-ops-runner
subjects:
  - kind: ServiceAccount
    name: home-ops-runner
    namespace: actions-runner-system
---
# Talos identity for image-pull.yaml only (talosctl image pull against the
# pod's own node). Stays os:admin — the ImagePull machine API requires it.
# With cluster-admin gone, no pod holds node-OS and cluster-wide power at
# the same time.
apiVersion: talos.dev/v1alpha1
kind: ServiceAccount
metadata:
  name: home-ops-runner
spec:
  roles:
    - os:admin
