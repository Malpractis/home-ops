---
# yaml-language-server: $schema=https://schemas.materia.wtf/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name azerothcore-image-runner
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
  interval: 1h
  values:
    githubConfigUrl: https://github.com/materia-ops/azerothcore-image
    githubConfigSecret: azerothcore-image-runner-secret
    # Scale-to-zero: the ~2h image build runs a couple of times a week; the
    # rest of the time this set costs the cluster nothing.
    minRunners: 0
    maxRunners: 1
    controllerServiceAccount:
      name: actions-runner-controller
      namespace: actions-runner-system
    # Hand-written dind spec (containerMode.type: dind can't set the dind
    # container's resources, and the CPU cap is the point): the AzerothCore
    # compile runs INSIDE dockerd, so the caps live on the dind container.
    # CPU limit 5 is a hard CFS ceiling — the build throttles, neighbors
    # never notice; the workflow passes BUILD_JOBS=4 to match (nproc inside
    # the container still reports host cores).
    # ndots:1 so external lookups query the bare name first, bypassing the
    # search path. REQUIRED while the actions-runner-egress toFQDNs policy
    # selects these pods: coredns autopath answers suffixed queries with the
    # public record, which Cilium's DNS proxy keys to a name the policy never
    # matches -> silent SYN drops (2026-07-18 listener outage). Applies to the
    # runner pods (template) and the listener (listenerTemplate) alike.
    listenerTemplate:
      spec:
        dnsConfig: &ndots
          options:
            - name: ndots
              value: "1"
    template:
      spec:
        dnsConfig: *ndots
        # The pod runs privileged dind for a public repo's builds - it must
        # not carry a Kubernetes API credential at all.
        automountServiceAccountToken: false
        initContainers:
          - name: init-dind-externals
            image: ghcr.io/actions/actions-runner:2.335.1@sha256:08c30b0a7105f64bddfc485d2487a22aa03932a791402393352fdf674bda2c29
            command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
            volumeMounts:
              - name: dind-externals
                mountPath: /home/runner/tmpDir
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:2.335.1@sha256:08c30b0a7105f64bddfc485d2487a22aa03932a791402393352fdf674bda2c29
            command: ["/home/runner/run.sh"]
            env:
              - name: DOCKER_HOST
                value: unix:///var/run/docker.sock
              - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
                value: "120"
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 2Gi
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /var/run
          - name: dind
            image: docker:29-dind@sha256:bfec1f5159c63a81ca6fdedbd81404d2c0e16378ed0feec3bb3fbf3998847659
            args:
              - dockerd
              - --host=unix:///var/run/docker.sock
              - --group=$(DOCKER_GROUP_GID)
            env:
              # GID of the docker group in the runner image above - only
              # valid for that digest; re-check when the runner pin moves.
              - name: DOCKER_GROUP_GID
                value: "123"
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: "2"
                memory: 4Gi
              limits:
                cpu: "5"
                memory: 12Gi
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /var/run
              - name: dind-externals
                mountPath: /home/runner/externals
              - name: docker-graph
                mountPath: /var/lib/docker
        volumes:
          - name: work
            emptyDir:
              sizeLimit: 10Gi
          - name: dind-sock
            emptyDir: {}
          - name: dind-externals
            emptyDir: {}
          # Image layers + build scratch for the full AzerothCore compile —
          # the GitHub-hosted runner needed ~45Gi after its cleanup step.
          - name: docker-graph
            emptyDir:
              sizeLimit: 80Gi
