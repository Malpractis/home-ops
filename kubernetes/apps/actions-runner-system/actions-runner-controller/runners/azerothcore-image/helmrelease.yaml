---
# yaml-language-server: $schema=https://schemas.materia.wtf/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name azerothcore-image-runner
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
  interval: 1h
  values:
    githubConfigUrl: https://github.com/materia-ops/azerothcore-image
    githubConfigSecret: azerothcore-image-runner-secret
    # Scale-to-zero: the ~2h image build runs a couple of times a week; the
    # rest of the time this set costs the cluster nothing.
    minRunners: 0
    maxRunners: 1
    controllerServiceAccount:
      name: actions-runner-controller
      namespace: actions-runner-system
    # Hand-written dind spec (containerMode.type: dind can't set the dind
    # container's resources, and the CPU cap is the point): the AzerothCore
    # compile runs INSIDE dockerd, so the caps live on the dind container.
    # CPU limit 5 is a hard CFS ceiling — the build throttles, neighbors
    # never notice; the workflow passes BUILD_JOBS=4 to match (nproc inside
    # the container still reports host cores).
    template:
      spec:
        initContainers:
          - name: init-dind-externals
            image: ghcr.io/actions/actions-runner:2.335.1
            command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
            volumeMounts:
              - name: dind-externals
                mountPath: /home/runner/tmpDir
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:2.335.1
            command: ["/home/runner/run.sh"]
            env:
              - name: DOCKER_HOST
                value: unix:///var/run/docker.sock
              - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
                value: "120"
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 2Gi
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /var/run
          - name: dind
            image: docker:29-dind
            args:
              - dockerd
              - --host=unix:///var/run/docker.sock
              - --group=$(DOCKER_GROUP_GID)
            env:
              - name: DOCKER_GROUP_GID
                value: "123"
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: "2"
                memory: 4Gi
              limits:
                cpu: "5"
                memory: 12Gi
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /var/run
              - name: dind-externals
                mountPath: /home/runner/externals
              - name: docker-graph
                mountPath: /var/lib/docker
        volumes:
          - name: work
            emptyDir:
              sizeLimit: 10Gi
          - name: dind-sock
            emptyDir: {}
          - name: dind-externals
            emptyDir: {}
          # Image layers + build scratch for the full AzerothCore compile —
          # the GitHub-hosted runner needed ~45Gi after its cleanup step.
          - name: docker-graph
            emptyDir:
              sizeLimit: 80Gi
