---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  deletionPolicy: WaitForTermination
  interval: 1h
  path: ./kubernetes/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  patches:
    - # Add Kustomization defaults for all child Kustomizations
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: _
                spec:
                  driftDetection:
                    mode: enabled
                  install:
                    crds: CreateReplace
                  rollback:
                    cleanupOnFail: true
                  upgrade:
                    cleanupOnFail: true
                    crds: CreateReplace
                  maxHistory: 2
                  # NOTE: remediation is deliberately NOT set here. This global
                  # patch overrides any per-HR value, so injecting a rollback
                  # policy fleet-wide clobbered every app AND rolled failed
                  # upgrades back — fatal for apps that migrate a DB schema
                  # forward on boot (arr/seerr/emby/stash/authentik/*-db/victoria-*):
                  # the old image then crash-loops on the new schema.
                  # With remediation unset, Flux defaults to fail-and-hold
                  # (retries 0, no rollback): a failed upgrade stops and alerts,
                  # and you roll FORWARD. Apps where rollback is safe opt in
                  # per-workload via spec.upgrade.remediation (see the stateless
                  # leaf services that set it).
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
