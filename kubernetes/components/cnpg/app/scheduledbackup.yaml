---
# yaml-language-server: $schema=https://schemas.materia.wtf/postgresql.cnpg.io/scheduledbackup_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres-${APP}-backup
spec:
  schedule: "30 2 * * *"   # 02:00 daily
  backupOwnerReference: self
  cluster:
    name: postgres-${APP}
  method: barmanObjectStore
