---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/pushsecret_v1alpha1.json
# CNPG auto-generates a secret named 'postgres-${APP}-app' after the cluster
# bootstraps, containing the application user's username and password.
# This PushSecret syncs those credentials to 1Password so the ExternalSecret
# in this namespace can pull them back as 'postgres-${APP}-credentials'.
# The 1Password item key matches the secret name: postgres-${APP}-app.
#
# NOTE: On first deploy (and after a restore) the ExternalSecret may report an
# error for up to one reconcile cycle (~5m, see refreshInterval) while waiting
# for CNPG to finish bootstrapping and this PushSecret to complete its first
# sync. This is expected — ESO will retry and succeed once creds land in 1Password.
#
# ONE per-property entry (password only), and both halves of that are
# load-bearing:
#
# - per-property (secretKey + property) is REQUIRED. ESO's 1Password provider
#   does not support whole-secret push: PushSecret() starts with
#   `secret.Data[ref.GetSecretKey()]` and returns ErrKeyNotFound when no
#   secretKey is set (providers/v1/onepassword/onepassword.go, verified at
#   v2.7.0 and v2.8.0) — surfacing as the MISLEADING error "key not found in
#   1Password Vaults", which points at 1P but actually means the empty
#   secretKey missed the source Secret's data map. A whole-secret spec
#   (PR #1127) broke this push permanently within seconds of apply.
#
# - ONE property is the race fix. Every sync calls UpdateItem
#   unconditionally; two entries meant two UpdateItems against the same item
#   back-to-back, and Connect's per-item optimistic locking intermittently
#   400'd the second (transient, self-healing, noisy in kube events). A
#   single entry is a single UpdateItem per sync — the race is structurally
#   impossible, not just less likely.
#
# username is NOT pushed: it is static — CNPG's initdb owner is ${APP}
# (cluster.yaml) — and the read-back ExternalSecret templates it directly.
# This also makes disaster recovery self-sufficient: a fresh vault item
# created by this push only ever needs the password field.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: postgres-${APP}-app
spec:
  secretStoreRefs:
    - name: onepassword-connect
      kind: ClusterSecretStore
  selector:
    secret:
      name: postgres-${APP}-app
  data:
    - match:
        secretKey: password
        remoteRef:
          remoteKey: postgres-${APP}-app
          property: password
