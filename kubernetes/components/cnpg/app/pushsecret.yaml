---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/pushsecret_v1alpha1.json
# CNPG auto-generates a secret named 'postgres-${APP}-app' after the cluster
# bootstraps, containing the application user's username and password.
# This PushSecret syncs those credentials to 1Password so the ExternalSecret
# in this namespace can pull them back as 'postgres-${APP}-credentials'.
# The 1Password item key matches the secret name: postgres-${APP}-app.
#
# NOTE: On first deploy (and after a restore) the ExternalSecret may report an
# error for up to one reconcile cycle (~5m, see refreshInterval) while waiting
# for CNPG to finish bootstrapping and this PushSecret to complete its first
# sync. This is expected — ESO will retry and succeed once creds land in 1Password.
#
# Single whole-secret push (was two per-property entries for username/password).
# Two entries meant two UpdateItem calls against the same 1Password item, which
# intermittently returned `400 Unable to update item` on 1Password Connect's
# per-item optimistic locking — a transient error that self-healed on the next
# reconcile but was noisy. Pushing the whole secret is one UpdateItem, so there
# is no intra-item race. The read-back ExternalSecret uses `dataFrom.extract`
# (whole item → `.username`/`.password`), so the extra CNPG fields (host, port,
# uri, pgpass, …) that now land in the item are ignored downstream and harmless.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: postgres-${APP}-app
spec:
  secretStoreRefs:
    - name: onepassword-connect
      kind: ClusterSecretStore
  selector:
    secret:
      name: postgres-${APP}-app
  data:
    - match:
        remoteRef:
          remoteKey: postgres-${APP}-app
