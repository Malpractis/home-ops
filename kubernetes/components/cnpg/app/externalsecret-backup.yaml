---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
# Garage S3 credentials for barman-cloud backups (from the 'cnpg' 1Password item).
# Creates a secret named 'postgres-backup-secret' in the consuming namespace.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-backup-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: postgres-backup-secret
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: cnpg
        property: s3-key-id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: cnpg
        property: s3-secret-key
