---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
# Pulls postgres credentials from 1Password (placed there by this namespace's
# PushSecret) and creates 'postgres-${APP}-credentials' in the consuming namespace.
# APP must be set in the parent Kustomization's postBuild.substitute.
#
# NOTE: The template keys below are Authentik-specific. If you reuse this
# component for a non-Authentik app, patch the template to use the env var
# names that app expects (e.g. POSTGRES_USER / POSTGRES_PASSWORD).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-${APP}-credentials
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: postgres-${APP}-credentials
    template:
      data:
        # Static on purpose: CNPG's initdb owner IS ${APP} (cluster.yaml), so
        # the username never needs to round-trip through 1Password. The
        # PushSecret only pushes the password (single UpdateItem per sync — see
        # pushsecret.yaml for why), so a fresh vault item has no username field.
        AUTHENTIK_POSTGRESQL__USER: "${APP}"
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: postgres-${APP}-app
