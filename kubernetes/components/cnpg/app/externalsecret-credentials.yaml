---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
# Pulls postgres credentials from 1Password (placed there by this namespace's
# PushSecret) and creates 'postgres-${APP}-secret' in the consuming namespace.
# APP must be set in the parent Kustomization's postBuild.substitute.
#
# NOTE: The template keys below are Authentik-specific. If you reuse this
# component for a non-Authentik app, patch the template to use the env var
# names that app expects (e.g. POSTGRES_USER / POSTGRES_PASSWORD).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-${APP}-credentials
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: postgres-${APP}-secret
    template:
      data:
        AUTHENTIK_POSTGRESQL__USER: "{{ .username }}"
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: postgres-${APP}-app
