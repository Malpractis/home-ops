---
# yaml-language-server: $schema=https://schemas.materia.wtf/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-${APP}
spec:
  instances: ${DB_INSTANCES:-2}
  imageName: ghcr.io/cloudnative-pg/postgresql:18

  storage:
    size: ${DB_SIZE:-10Gi}
    storageClass: ${DB_STORAGE_CLASS:-openebs-hostpath}

  env:
    - name: AWS_DEFAULT_REGION
      value: garage

  postgresql:
    # dataDurability=preferred (default): writes fall back to local-commit if the
    # standby is unavailable rather than blocking — the right call at 2 instances.
    # At 3+ instances set DB_DURABILITY=required: with number=1 and two standbys, a
    # single node loss still leaves a sync standby to ack, giving zero-data-loss
    # synchronous replication without write-stalling on single-node failure.
    synchronous:
      method: any
      number: 1
      dataDurability: ${DB_DURABILITY:-preferred}
    parameters:
      max_connections: "200"
      shared_buffers: 256MB
      max_wal_size: 4GB
      checkpoint_timeout: 10min
      autovacuum_max_workers: "3"
      autovacuum_vacuum_cost_limit: "2000"
      log_min_duration_statement: "500"
      log_checkpoints: "on"
      log_lock_waits: "on"
    pg_hba:
      - hostssl all all all scram-sha-256

  bootstrap:
    # Normal path: fresh cluster. For disaster recovery from a barman-cloud
    # backup, use the components/cnpg/restore component overlay instead —
    # see that component's kustomization.yaml for the full restore procedure.
    #
    # Before first deploy, create the Garage bucket:
    #   garage bucket create postgres-${APP}-backup
    #   garage bucket allow --read --write --owner postgres-${APP}-backup --key <cnpg-key-name>
    initdb:
      database: ${APP}
      owner: ${APP}

  backup:
    barmanObjectStore:
      destinationPath: s3://postgres-${APP}-backup
      endpointURL: http://garage.internal:3900
      s3Credentials:
        accessKeyId:
          name: postgres-backup-secret
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: postgres-backup-secret
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 8
      data:
        compression: gzip
        jobs: 8
        encryption: AES256
    retentionPolicy: "30d"

  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi
