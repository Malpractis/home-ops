---
# yaml-language-server: $schema=https://schemas.materia.wtf/postgresql.cnpg.io/cluster_v1.json
# Strategic merge patch applied by the cnpg/restore component.
# Replaces bootstrap.initdb with bootstrap.recovery and injects externalClusters
# so CNPG knows where to find the barman-cloud backup.
#
# For point-in-time recovery: uncomment recoveryTarget.targetTime and set the
# timestamp (UTC) to the moment just before the incident. CNPG will replay WAL
# up to that point. Omitting it recovers to the latest available WAL.
#
# See components/cnpg/restore/kustomization.yaml for the full restore procedure.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-${APP}
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  bootstrap:
    initdb: null
    recovery:
      source: postgres-${APP}
      database: ${APP}
      owner: ${APP}
      # recoveryTarget:
      #   targetTime: "2006-01-02 15:04:05"   # UTC, format must match exactly
  externalClusters:
    - name: postgres-${APP}
      barmanObjectStore:
        destinationPath: s3://postgres-${APP}-backup
        endpointURL: http://garage.internal:3900
        s3Credentials:
          accessKeyId:
            name: postgres-backup-secret
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: postgres-backup-secret
            key: SECRET_ACCESS_KEY
        wal:
          maxParallel: 8
