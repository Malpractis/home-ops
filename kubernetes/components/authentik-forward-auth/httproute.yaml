---
# yaml-language-server: $schema=https://schemas.materia.wtf/gateway.networking.k8s.io/httproute_v1.json
# Routes the Authentik outpost callback/start paths (/outpost.goauthentik.io/*) on the
# app's hostname directly to the embedded outpost (authentik-server), bypassing the app
# backend AND the ext_authz SecurityPolicy (which targets only the app's own HTTPRoute).
# Without this, the post-login callback is mis-routed -> "invalid state" / HTTP 400.
# Most-specific path wins, so only /outpost.goauthentik.io/* is diverted; all other
# traffic continues to the app route.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${APP}-outpost
spec:
  hostnames:
    - ${APP_HOST:-${APP}.materia.wtf}
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /outpost.goauthentik.io/
      backendRefs:
        - group: ""
          kind: Service
          name: authentik-server
          namespace: security
          port: 80
