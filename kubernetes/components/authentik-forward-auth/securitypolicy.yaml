---
# yaml-language-server: $schema=https://schemas.materia.wtf/gateway.envoyproxy.io/securitypolicy_v1alpha1.json
# Forward-auth via the Authentik embedded outpost (ext_authz).
# Targets the app's HTTPRoute; unauthenticated requests are redirected to Authentik.
# The embedded outpost is served by the authentik-server Service (no separate
# ak-outpost-* Service exists for embedded outposts here). Verified:
# GET authentik-server:80/outpost.goauthentik.io/ping -> 204.
# Requires the app to be a proxy provider + embedded-outpost member in Authentik.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: ${APP}-forward-auth
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: ${APP_ROUTE:-${APP}}
  extAuth:
    # failOpen=false: if the outpost is unreachable, DENY rather than serve the
    # app unauthenticated. The outpost is now trusted (security review #2 —
    # fail-open was a latent "silently serves with no auth" trap).
    failOpen: false
    # Headers forwarded FROM the client request TO the outpost (ext_authz check).
    # For an HTTP auth service, Envoy Gateway otherwise sends only Host/Method/Path/
    # Content-Length/Authorization â€” it strips Cookie, so the outpost never sees the
    # session and loops post-login (ERR_TOO_MANY_REDIRECTS). 'accept' lets Authentik
    # choose a 302 redirect (browser) vs 401 (API).
    headersToExtAuth:
      - authorization
      - cookie
      - accept
    http:
      backendRefs:
        - group: ""
          kind: Service
          name: authentik-server
          namespace: security
          port: 80
      path: /outpost.goauthentik.io/auth/envoy
      headersToBackend:
        - authorization
        - cookie
        - set-cookie
        - x-authentik-username
        - x-authentik-groups
        - x-authentik-email
        - x-authentik-name
        - x-authentik-uid
        - x-authentik-jwt
        - x-authentik-meta-jwks
        - x-authentik-meta-outpost
        - x-authentik-meta-provider
        - x-authentik-meta-app
        - x-authentik-meta-version
