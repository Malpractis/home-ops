---
# yaml-language-server: $schema=https://schemas.materia.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-status-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: github-status-token-secret
    template:
      data:
        # materia-minion App auth (statuses: write) instead of a PAT — the
        # org forbids fine-grained PATs living >366 days, and App tokens
        # never expire or die with an owner transfer. IDs aren't secret.
        githubAppID: "3732308"
        githubAppInstallationID: "147229909"
        githubAppPrivateKey: "{{ .GITHUB_BOT_APP_PRIVATE_KEY }}"
  dataFrom:
    - extract:
        key: github-bot
