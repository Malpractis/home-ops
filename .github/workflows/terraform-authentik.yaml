---
name: Authentik Terraform

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - "terraform/authentik/**"
      - "!terraform/authentik/**/*.md"
  push:
    branches: ["main"]
    paths:
      - "terraform/authentik/**"
      - "!terraform/authentik/**/*.md"

jobs:
  plan:
    name: Terraform Plan
    runs-on: home-ops-runner
    defaults:
      run:
        working-directory: terraform/authentik
    steps:
      - name: Load Secrets
        id: load-secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AWS_ACCESS_KEY_ID: op://kubernetes/terraform/s3-key-id
          AWS_SECRET_ACCESS_KEY: op://kubernetes/terraform/s3-secret-key
          AUTHENTIK_TOKEN: op://kubernetes/authentik/AUTHENTIK_TOKEN
          TF_VAR_authentik_token: op://kubernetes/authentik/AUTHENTIK_TOKEN
          TF_VAR_turnstile_site_key: op://kubernetes/cloudflare-turnstile/site-key
          TF_VAR_turnstile_secret_key: op://kubernetes/cloudflare-turnstile/secret-key
          TF_VAR_discord_client_id: op://kubernetes/discord-oauth/client-id
          TF_VAR_discord_client_secret: op://kubernetes/discord-oauth/client-secret
          TF_VAR_google_client_id: op://kubernetes/google-oauth/client-id
          TF_VAR_google_client_secret: op://kubernetes/google-oauth/client-secret
          TF_VAR_github_client_id: op://kubernetes/github-oauth/client-id
          TF_VAR_github_client_secret: op://kubernetes/github-oauth/client-secret
          TF_VAR_plex_client_id: op://kubernetes/plex-oauth/client-id
          TF_VAR_plex_token: op://kubernetes/plex-oauth/token

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false  # avoid Node.js shim — runner does not have node in PATH

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.load-secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.load-secrets.outputs.AWS_SECRET_ACCESS_KEY }}
        run: terraform init

      - name: Import Embedded Outpost
        # The embedded outpost is created by Authentik automatically on install,
        # so it exists in Authentik but not in Terraform state on the first run.
        # This step imports it once and is a no-op on subsequent runs.
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.load-secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.load-secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          AUTHENTIK_TOKEN: ${{ steps.load-secrets.outputs.AUTHENTIK_TOKEN }}
          TF_VAR_authentik_token: ${{ steps.load-secrets.outputs.TF_VAR_AUTHENTIK_TOKEN }}
          TF_VAR_turnstile_site_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SITE_KEY }}
          TF_VAR_turnstile_secret_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SECRET_KEY }}
          TF_VAR_discord_client_id: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_ID }}
          TF_VAR_discord_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_SECRET }}
          TF_VAR_google_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_SECRET }}
          TF_VAR_github_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_ID }}
          TF_VAR_github_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_SECRET }}
          TF_VAR_plex_client_id: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_CLIENT_ID }}
          TF_VAR_plex_token: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_TOKEN }}
        run: |
          if ! terraform state show authentik_outpost.embedded > /dev/null 2>&1; then
            echo "Importing embedded outpost..."
            OUTPOST_PK=$(curl -sf \
              -H "Authorization: Bearer ${AUTHENTIK_TOKEN}" \
              "https://auth.materia.wtf/api/v3/outposts/instances/?managed=goauthentik.io%2Foutposts%2Fembedded" \
              | jq -r '.results[0].pk')
            terraform import authentik_outpost.embedded "${OUTPOST_PK}"
          else
            echo "Embedded outpost already in state, skipping import."
          fi

      - name: Terraform Validate
        env:
          TF_VAR_authentik_token: ${{ steps.load-secrets.outputs.TF_VAR_AUTHENTIK_TOKEN }}
          TF_VAR_turnstile_site_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SITE_KEY }}
          TF_VAR_turnstile_secret_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SECRET_KEY }}
          TF_VAR_discord_client_id: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_ID }}
          TF_VAR_discord_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_SECRET }}
          TF_VAR_google_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_SECRET }}
          TF_VAR_github_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_ID }}
          TF_VAR_github_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_SECRET }}
          TF_VAR_plex_client_id: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_CLIENT_ID }}
          TF_VAR_plex_token: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_TOKEN }}
        run: terraform validate

      - name: Terraform Plan
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.load-secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.load-secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_authentik_token: ${{ steps.load-secrets.outputs.TF_VAR_AUTHENTIK_TOKEN }}
          TF_VAR_turnstile_site_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SITE_KEY }}
          TF_VAR_turnstile_secret_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SECRET_KEY }}
          TF_VAR_discord_client_id: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_ID }}
          TF_VAR_discord_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_SECRET }}
          TF_VAR_google_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_SECRET }}
          TF_VAR_github_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_ID }}
          TF_VAR_github_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_SECRET }}
          TF_VAR_plex_client_id: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_CLIENT_ID }}
          TF_VAR_plex_token: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_TOKEN }}
        run: terraform plan -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tfplan
          path: terraform/authentik/tfplan
          retention-days: 1

  apply:
    name: Terraform Apply
    needs: plan
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: home-ops-runner
    defaults:
      run:
        working-directory: terraform/authentik
    steps:
      - name: Load Secrets
        id: load-secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AWS_ACCESS_KEY_ID: op://kubernetes/terraform/s3-key-id
          AWS_SECRET_ACCESS_KEY: op://kubernetes/terraform/s3-secret-key
          AUTHENTIK_TOKEN: op://kubernetes/authentik/AUTHENTIK_TOKEN
          TF_VAR_authentik_token: op://kubernetes/authentik/AUTHENTIK_TOKEN
          TF_VAR_turnstile_site_key: op://kubernetes/cloudflare-turnstile/site-key
          TF_VAR_turnstile_secret_key: op://kubernetes/cloudflare-turnstile/secret-key
          TF_VAR_discord_client_id: op://kubernetes/discord-oauth/client-id
          TF_VAR_discord_client_secret: op://kubernetes/discord-oauth/client-secret
          TF_VAR_google_client_id: op://kubernetes/google-oauth/client-id
          TF_VAR_google_client_secret: op://kubernetes/google-oauth/client-secret
          TF_VAR_github_client_id: op://kubernetes/github-oauth/client-id
          TF_VAR_github_client_secret: op://kubernetes/github-oauth/client-secret
          TF_VAR_plex_client_id: op://kubernetes/plex-oauth/client-id
          TF_VAR_plex_token: op://kubernetes/plex-oauth/token

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false  # avoid Node.js shim — runner does not have node in PATH

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.load-secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.load-secrets.outputs.AWS_SECRET_ACCESS_KEY }}
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: tfplan
          path: terraform/authentik

      - name: Terraform Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.load-secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.load-secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_authentik_token: ${{ steps.load-secrets.outputs.TF_VAR_AUTHENTIK_TOKEN }}
          TF_VAR_turnstile_site_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SITE_KEY }}
          TF_VAR_turnstile_secret_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SECRET_KEY }}
          TF_VAR_discord_client_id: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_ID }}
          TF_VAR_discord_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_SECRET }}
          TF_VAR_google_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_SECRET }}
          TF_VAR_github_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_ID }}
          TF_VAR_github_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_SECRET }}
          TF_VAR_plex_client_id: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_CLIENT_ID }}
          TF_VAR_plex_token: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_TOKEN }}
        run: terraform apply -auto-approve tfplan

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Store OIDC Client Secrets in 1Password
        # Writes each client secret into 1Password so ExternalSecrets can pull
        # them automatically — avoids needing to manually retrieve masked outputs.
        #
        # Items must already exist in 1Password (vault: kubernetes):
        #   grafana  → field: client-secret
        #   seerr    → field: client-secret
        #   truenas  → field: client-secret
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_authentik_token: ${{ steps.load-secrets.outputs.TF_VAR_AUTHENTIK_TOKEN }}
          TF_VAR_turnstile_site_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SITE_KEY }}
          TF_VAR_turnstile_secret_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SECRET_KEY }}
          TF_VAR_discord_client_id: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_ID }}
          TF_VAR_discord_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_SECRET }}
          TF_VAR_google_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_SECRET }}
          TF_VAR_github_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_ID }}
          TF_VAR_github_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_SECRET }}
          TF_VAR_plex_client_id: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_CLIENT_ID }}
          TF_VAR_plex_token: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_TOKEN }}
        run: |
          op item edit grafana  --vault kubernetes "client-secret=$(terraform output -raw grafana_client_secret)"
          op item edit seerr    --vault kubernetes "client-secret=$(terraform output -raw seerr_client_secret)"
          op item edit truenas  --vault kubernetes "client-secret=$(terraform output -raw truenas_client_secret)"
