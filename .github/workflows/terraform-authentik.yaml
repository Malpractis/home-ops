---
name: Authentik Terraform

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - "terraform/authentik/**"
      - "!terraform/authentik/**/*.md"
  push:
    branches: ["main"]
    paths:
      - "terraform/authentik/**"
      - "!terraform/authentik/**/*.md"

jobs:
  plan:
    name: Terraform Plan
    runs-on: home-ops-runner
    defaults:
      run:
        working-directory: terraform/authentik
    steps:
      - name: Load Secrets
        id: load-secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AWS_ACCESS_KEY_ID: op://kubernetes/terraform/s3-key-id
          AWS_SECRET_ACCESS_KEY: op://kubernetes/terraform/s3-secret-key
          AUTHENTIK_TOKEN: op://kubernetes/authentik/AUTHENTIK_TOKEN
          TF_VAR_authentik_token: op://kubernetes/authentik/AUTHENTIK_TOKEN
          TF_VAR_turnstile_site_key: op://kubernetes/cloudflare-turnstile/site-key
          TF_VAR_turnstile_secret_key: op://kubernetes/cloudflare-turnstile/secret-key
          TF_VAR_discord_client_id: op://kubernetes/discord-oauth/client-id
          TF_VAR_discord_client_secret: op://kubernetes/discord-oauth/client-secret
          TF_VAR_google_client_id: op://kubernetes/google-oauth/client-id
          TF_VAR_google_client_secret: op://kubernetes/google-oauth/client-secret
          TF_VAR_github_client_id: op://kubernetes/github-oauth/client-id
          TF_VAR_github_client_secret: op://kubernetes/github-oauth/client-secret
          TF_VAR_plex_client_id: op://kubernetes/plex-oauth/client-id
          TF_VAR_plex_token: op://kubernetes/plex-oauth/token

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false  # avoid Node.js shim — runner does not have node in PATH

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.load-secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.load-secrets.outputs.AWS_SECRET_ACCESS_KEY }}
        run: terraform init

      - name: Import Pre-existing Authentik Resources
        # Imports resources that already exist in Authentik but aren't in TF state.
        # Each block is a no-op on subsequent runs (checks state first).
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.load-secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.load-secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          AUTHENTIK_TOKEN: ${{ steps.load-secrets.outputs.AUTHENTIK_TOKEN }}
          TF_VAR_authentik_token: ${{ steps.load-secrets.outputs.TF_VAR_AUTHENTIK_TOKEN }}
          TF_VAR_turnstile_site_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SITE_KEY }}
          TF_VAR_turnstile_secret_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SECRET_KEY }}
          TF_VAR_discord_client_id: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_ID }}
          TF_VAR_discord_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_SECRET }}
          TF_VAR_google_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_SECRET }}
          TF_VAR_github_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_ID }}
          TF_VAR_github_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_SECRET }}
          TF_VAR_plex_client_id: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_CLIENT_ID }}
          TF_VAR_plex_token: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_TOKEN }}
        run: |
          AK_API="https://auth.materia.wtf/api/v3"
          AK_HDR="Authorization: Bearer ${AUTHENTIK_TOKEN}"

          # ── Embedded outpost ───────────────────────────────────────────────
          if ! terraform state show authentik_outpost.embedded > /dev/null 2>&1; then
            echo "Importing embedded outpost..."
            PK=$(curl -sf -H "${AK_HDR}" \
              "${AK_API}/outposts/instances/?managed=goauthentik.io%2Foutposts%2Fembedded" \
              | jq -r '.results[0].pk')
            terraform import authentik_outpost.embedded "${PK}"
          else
            echo "Embedded outpost already in state, skipping."
          fi

          # ── Default brand ──────────────────────────────────────────────────
          if ! terraform state show authentik_brand.main > /dev/null 2>&1; then
            echo "Importing default brand..."
            PK=$(curl -sf -H "${AK_HDR}" \
              "${AK_API}/core/brands/?default=true" \
              | jq -r '.results[0].brand_uuid')
            terraform import authentik_brand.main "${PK}"
          else
            echo "Default brand already in state, skipping."
          fi

          # ── Helper: import a proxy app + its provider by slug ──────────────
          import_proxy_app() {
            local TF_KEY="$1"   # for_each map key (e.g. "stash")
            local SLUG="$2"     # Authentik slug  (usually the same)
            local GROUP="$3"    # "media" or "admin"

            local APP_ADDR="authentik_application.${GROUP}[\"${TF_KEY}\"]"
            local PRV_ADDR="authentik_provider_proxy.${GROUP}[\"${TF_KEY}\"]"

            # Fetch provider ID from application's API endpoint
            PROVIDER_ID=$(curl -sf -H "${AK_HDR}" "${AK_API}/core/applications/${SLUG}/" \
              | jq -r '.provider')

            if ! terraform state show "${PRV_ADDR}" > /dev/null 2>&1; then
              echo "Importing ${GROUP} provider for: ${SLUG}..."
              if [ "${PROVIDER_ID}" != "null" ] && [ -n "${PROVIDER_ID}" ]; then
                terraform import "${PRV_ADDR}" "${PROVIDER_ID}"
              fi
            else
              echo "${GROUP} provider '${SLUG}' already in state, skipping."
            fi

            if ! terraform state show "${APP_ADDR}" > /dev/null 2>&1; then
              echo "Importing ${GROUP} app: ${SLUG}..."
              # authentik_application import ID is the slug, not the UUID
              terraform import "${APP_ADDR}" "${SLUG}"
            else
              echo "${GROUP} app '${SLUG}' already in state, skipping."
            fi
          }

          # Apps that existed in Authentik before Terraform took over
          import_proxy_app "stash"      "stash"      "media"
          import_proxy_app "calibre-dl" "calibre-dl" "media"

      - name: Terraform Validate
        env:
          TF_VAR_authentik_token: ${{ steps.load-secrets.outputs.TF_VAR_AUTHENTIK_TOKEN }}
          TF_VAR_turnstile_site_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SITE_KEY }}
          TF_VAR_turnstile_secret_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SECRET_KEY }}
          TF_VAR_discord_client_id: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_ID }}
          TF_VAR_discord_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_SECRET }}
          TF_VAR_google_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_SECRET }}
          TF_VAR_github_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_ID }}
          TF_VAR_github_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_SECRET }}
          TF_VAR_plex_client_id: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_CLIENT_ID }}
          TF_VAR_plex_token: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_TOKEN }}
        run: terraform validate

      - name: Terraform Plan
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.load-secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.load-secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_authentik_token: ${{ steps.load-secrets.outputs.TF_VAR_AUTHENTIK_TOKEN }}
          TF_VAR_turnstile_site_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SITE_KEY }}
          TF_VAR_turnstile_secret_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SECRET_KEY }}
          TF_VAR_discord_client_id: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_ID }}
          TF_VAR_discord_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_SECRET }}
          TF_VAR_google_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_SECRET }}
          TF_VAR_github_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_ID }}
          TF_VAR_github_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_SECRET }}
          TF_VAR_plex_client_id: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_CLIENT_ID }}
          TF_VAR_plex_token: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_TOKEN }}
        run: terraform plan -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tfplan
          path: terraform/authentik/tfplan
          retention-days: 1

  apply:
    name: Terraform Apply
    needs: plan
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: home-ops-runner
    defaults:
      run:
        working-directory: terraform/authentik
    steps:
      - name: Load Secrets
        id: load-secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AWS_ACCESS_KEY_ID: op://kubernetes/terraform/s3-key-id
          AWS_SECRET_ACCESS_KEY: op://kubernetes/terraform/s3-secret-key
          AUTHENTIK_TOKEN: op://kubernetes/authentik/AUTHENTIK_TOKEN
          TF_VAR_authentik_token: op://kubernetes/authentik/AUTHENTIK_TOKEN
          TF_VAR_turnstile_site_key: op://kubernetes/cloudflare-turnstile/site-key
          TF_VAR_turnstile_secret_key: op://kubernetes/cloudflare-turnstile/secret-key
          TF_VAR_discord_client_id: op://kubernetes/discord-oauth/client-id
          TF_VAR_discord_client_secret: op://kubernetes/discord-oauth/client-secret
          TF_VAR_google_client_id: op://kubernetes/google-oauth/client-id
          TF_VAR_google_client_secret: op://kubernetes/google-oauth/client-secret
          TF_VAR_github_client_id: op://kubernetes/github-oauth/client-id
          TF_VAR_github_client_secret: op://kubernetes/github-oauth/client-secret
          TF_VAR_plex_client_id: op://kubernetes/plex-oauth/client-id
          TF_VAR_plex_token: op://kubernetes/plex-oauth/token

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false  # avoid Node.js shim — runner does not have node in PATH

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.load-secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.load-secrets.outputs.AWS_SECRET_ACCESS_KEY }}
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tfplan
          path: terraform/authentik

      - name: Terraform Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.load-secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.load-secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_authentik_token: ${{ steps.load-secrets.outputs.TF_VAR_AUTHENTIK_TOKEN }}
          TF_VAR_turnstile_site_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SITE_KEY }}
          TF_VAR_turnstile_secret_key: ${{ steps.load-secrets.outputs.TF_VAR_TURNSTILE_SECRET_KEY }}
          TF_VAR_discord_client_id: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_ID }}
          TF_VAR_discord_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_DISCORD_CLIENT_SECRET }}
          TF_VAR_google_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GOOGLE_CLIENT_SECRET }}
          TF_VAR_github_client_id: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_ID }}
          TF_VAR_github_client_secret: ${{ steps.load-secrets.outputs.TF_VAR_GITHUB_CLIENT_SECRET }}
          TF_VAR_plex_client_id: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_CLIENT_ID }}
          TF_VAR_plex_token: ${{ steps.load-secrets.outputs.TF_VAR_PLEX_TOKEN }}
        run: terraform apply -auto-approve tfplan

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@8d006a0d0a4fd505af7f7ce589e7f768385ff5e4 # v3.0.0

      - name: Store OIDC Client Secrets in 1Password
        # Writes each client secret into 1Password so ExternalSecrets can pull
        # them automatically — avoids needing to manually retrieve masked outputs.
        #
        # Items must already exist in 1Password (vault: kubernetes):
        #   grafana  → field: client-secret
        #   seerr    → field: client-secret
        #   truenas  → field: client-secret
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ steps.load-secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.load-secrets.outputs.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "=== op version ==="
          op --version

          echo "=== op environment ==="
          env | grep -i "^OP_" || true

          echo "=== HOME / config dir ==="
          echo "HOME=${HOME}"
          ls -la ~/.config/op/ 2>/dev/null || echo "(no op config dir)"
          cat ~/.config/op/config 2>/dev/null || echo "(no config file)"

          echo "=== op whoami ==="
          op whoami

          echo "=== read test ==="
          op item get grafana --vault kubernetes --fields label=client-secret

          echo "=== static write test ==="
          op item edit grafana --vault kubernetes "client-secret=testvalue123"

          echo "Retrieving Terraform outputs..."
          GRAFANA_SECRET=$(terraform output -raw grafana_client_secret 2>/dev/null || true)
          SEERR_SECRET=$(terraform output -raw seerr_client_secret 2>/dev/null || true)
          TRUENAS_SECRET=$(terraform output -raw truenas_client_secret 2>/dev/null || true)

          echo "Secret lengths: grafana=${#GRAFANA_SECRET} seerr=${#SEERR_SECRET} truenas=${#TRUENAS_SECRET}"
          echo "Grafana prefix:  ${GRAFANA_SECRET:0:8}"
          echo "Seerr prefix:    ${SEERR_SECRET:0:8}"
          echo "TrueNAS prefix:  ${TRUENAS_SECRET:0:8}"

          if [ -z "${GRAFANA_SECRET}" ] || [ -z "${SEERR_SECRET}" ] || [ -z "${TRUENAS_SECRET}" ]; then
            echo "ERROR: One or more Terraform outputs are empty"
            [ -z "${GRAFANA_SECRET}" ]  && echo "  grafana_client_secret is empty"
            [ -z "${SEERR_SECRET}" ]    && echo "  seerr_client_secret is empty"
            [ -z "${TRUENAS_SECRET}" ]  && echo "  truenas_client_secret is empty"
            exit 1
          fi

          echo "Updating 1Password items..."
          op item edit grafana  --vault kubernetes "client-secret=${GRAFANA_SECRET}"
          op item edit seerr    --vault kubernetes "client-secret=${SEERR_SECRET}"
          op item edit truenas  --vault kubernetes "client-secret=${TRUENAS_SECRET}"
          echo "Done — client secrets written to 1Password."
