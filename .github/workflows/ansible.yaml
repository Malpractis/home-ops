---
name: Configure Infrastructure

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Restrict to host(s)/group (ansible --limit). Blank = all."
        required: false
        type: string
      check_only:
        description: "Dry run only — run Check (--check --diff) and skip Apply."
        required: false
        type: boolean
        default: true
  pull_request:
    branches: ["main"]
    paths:
      - "infrastructure/**"
      - "!infrastructure/**/*.md"
  push:
    branches: ["main"]
    paths:
      - "infrastructure/**"
      - "!infrastructure/**/*.md"

permissions: {}

jobs:
  # Job 1: Dry Run (Runs on PRs and Main)
  check:
    name: Ansible Check (Dry Run)
    runs-on: home-ops-runner
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14" # Pin to stable 3.11
          cache: "pip" # Optional: caches pip dependencies
          cache-dependency-path: infrastructure/requirements.txt
      - name: Install Requirements
        run: pip install -r infrastructure/requirements.txt
      - name: Install Ansible Galaxy Roles
        run: ansible-galaxy install -r infrastructure/requirements.yaml
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
      - name: Install 1Password CLI
        run: |
          set -euo pipefail
          ARCH="$(dpkg --print-architecture)"
          OP_VERSION="v2.31.1"
          curl -sSfL "https://cache.agilebits.com/dist/1P/op2/pkg/${OP_VERSION}/op_linux_${ARCH}_${OP_VERSION}.zip" -o /tmp/op.zip
          mkdir -p "$HOME/.local/bin"
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/op.zip').extract('op', '$HOME/.local/bin')"
          chmod +x "$HOME/.local/bin/op"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/op" --version
      - name: Run Ansible Playbook (Check Mode)
        working-directory: infrastructure
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          ansible-playbook -i inventory/hosts.yaml playbook.yaml --check --diff ${{ inputs.limit && format('--limit {0}', inputs.limit) || '' }} -e 'ansible_python_interpreter=/usr/bin/python3'

  # Job 2: Apply. Auto-runs on push to main (after Check passes); can also be triggered
  # manually via workflow_dispatch (check_only=false), optionally scoped with `limit`.
  # The dnscrypt play is serial:1 + any_errors_fatal + a resolve check, so the rollout
  # is gated one Pi at a time (pi-1 then pi-0) regardless of how it's triggered.
  apply:
    name: Ansible Apply
    needs: check
    if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.check_only)) && github.ref == 'refs/heads/main'
    runs-on: home-ops-runner
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14" # Pin to stable 3.11
          cache: "pip" # Optional: caches pip dependencies
          cache-dependency-path: infrastructure/requirements.txt
      - name: Install Requirements
        run: pip install -r infrastructure/requirements.txt
      - name: Install Galaxy Roles
        run: ansible-galaxy install -r infrastructure/requirements.yaml
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
      - name: Install 1Password CLI
        run: |
          set -euo pipefail
          ARCH="$(dpkg --print-architecture)"
          OP_VERSION="v2.31.1"
          curl -sSfL "https://cache.agilebits.com/dist/1P/op2/pkg/${OP_VERSION}/op_linux_${ARCH}_${OP_VERSION}.zip" -o /tmp/op.zip
          mkdir -p "$HOME/.local/bin"
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/op.zip').extract('op', '$HOME/.local/bin')"
          chmod +x "$HOME/.local/bin/op"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/op" --version
      - name: Run Ansible Playbook (Apply)
        working-directory: infrastructure
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          ansible-playbook -i inventory/hosts.yaml playbook.yaml ${{ inputs.limit && format('--limit {0}', inputs.limit) || '' }} -e 'ansible_python_interpreter=/usr/bin/python3'
