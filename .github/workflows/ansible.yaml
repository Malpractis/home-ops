---
name: Configure Infrastructure

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Ansible --tags (comma-sep: dnscrypt, observability). Blank = all."
        required: false
        type: string
      limit:
        description: "Restrict to host(s)/group (ansible --limit). Blank = all."
        required: false
        type: string
      check_only:
        description: "Dry run only — run Check (--check --diff) and skip Apply."
        required: false
        type: boolean
        default: true
  pull_request:
    branches: ["main"]
    paths:
      - "infrastructure/**"
      - "!infrastructure/**/*.md"
  push:
    branches: ["main"]
    paths:
      - "infrastructure/**"
      - "!infrastructure/**/*.md"

permissions: {}

jobs:
  # Job 0: decide which play tags to run from the changed paths.
  # Only roles/dnscrypt_proxy changed -> dnscrypt; only group_vars -> observability;
  # structural files (playbook/inventory/requirements/cfg) or a manual blank -> all.
  plan:
    name: Plan (decide tags)
    runs-on: home-ops-runner
    permissions:
      contents: read
      pull-requests: read
    outputs:
      tags: ${{ steps.decide.outputs.tags }}
    steps:
      - name: Decide ansible --tags from changed paths
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
          DISPATCH_TAGS: ${{ inputs.tags }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "tags=${DISPATCH_TAGS}" >> "$GITHUB_OUTPUT"
            echo "dispatch -> tags='${DISPATCH_TAGS}' (blank = all)"
            exit 0
          fi
          api() { curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$1"; }
          if [ "$EVENT" = "pull_request" ]; then
            FILES="$(api "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/files?per_page=100" \
              | python3 -c 'import sys,json; print("\n".join(f["filename"] for f in json.load(sys.stdin)))')"
          else
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "tags=" >> "$GITHUB_OUTPUT"; echo "no before sha -> all"; exit 0
            fi
            FILES="$(api "https://api.github.com/repos/$REPO/compare/$BEFORE...$SHA" \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); print("\n".join(f["filename"] for f in d.get("files",[])))')"
          fi
          echo "Changed files:"; printf '%s\n' "$FILES"
          if printf '%s\n' "$FILES" | grep -qE '^infrastructure/(playbook\.yaml|requirements\.ya?ml|requirements\.txt|ansible\.cfg|inventory/hosts\.yaml)$'; then
            echo "tags=" >> "$GITHUB_OUTPUT"; echo "structural change -> all"; exit 0
          fi
          SEL=""
          if printf '%s\n' "$FILES" | grep -qE '^infrastructure/roles/dnscrypt_proxy/'; then SEL="${SEL:+$SEL,}dnscrypt"; fi
          if printf '%s\n' "$FILES" | grep -qE '^infrastructure/inventory/group_vars/'; then SEL="${SEL:+$SEL,}observability"; fi
          echo "tags=$SEL" >> "$GITHUB_OUTPUT"
          echo "resolved tags='$SEL' (blank = all)"

  # Job 1: Dry Run (Runs on PRs and Main)
  check:
    name: Ansible Check (Dry Run)
    needs: plan
    runs-on: home-ops-runner
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14" # Pin to stable 3.11
          cache: "pip" # Optional: caches pip dependencies
          cache-dependency-path: infrastructure/requirements.txt
      - name: Install Requirements
        run: pip install -r infrastructure/requirements.txt
      - name: Install Ansible Galaxy Roles
        run: ansible-galaxy install -r infrastructure/requirements.yaml
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
      - name: Install 1Password CLI
        run: |
          set -euo pipefail
          ARCH="$(dpkg --print-architecture)"
          OP_VERSION="v2.31.1"
          curl -sSfL "https://cache.agilebits.com/dist/1P/op2/pkg/${OP_VERSION}/op_linux_${ARCH}_${OP_VERSION}.zip" -o /tmp/op.zip
          mkdir -p "$HOME/.local/bin"
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/op.zip').extract('op', '$HOME/.local/bin')"
          chmod +x "$HOME/.local/bin/op"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/op" --version
      - name: Run Ansible Playbook (Check Mode)
        working-directory: infrastructure
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          ansible-playbook -i inventory/hosts.yaml playbook.yaml --check --diff ${{ needs.plan.outputs.tags && format('--tags {0}', needs.plan.outputs.tags) || '' }} ${{ inputs.limit && format('--limit {0}', inputs.limit) || '' }} -e 'ansible_python_interpreter=/usr/bin/python3'

  # Job 2: Apply. Auto-runs on push to main (after Check passes); can also be triggered
  # manually via workflow_dispatch (check_only=false), optionally scoped with `limit`/`tags`.
  # The dnscrypt play is serial:1 + any_errors_fatal + a resolve check, so the rollout
  # is gated one Pi at a time (pi-1 then pi-0) regardless of how it's triggered.
  apply:
    name: Ansible Apply
    needs: [plan, check]
    if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.check_only)) && github.ref == 'refs/heads/main'
    runs-on: home-ops-runner
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14" # Pin to stable 3.11
          cache: "pip" # Optional: caches pip dependencies
          cache-dependency-path: infrastructure/requirements.txt
      - name: Install Requirements
        run: pip install -r infrastructure/requirements.txt
      - name: Install Galaxy Roles
        run: ansible-galaxy install -r infrastructure/requirements.yaml
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
      - name: Install 1Password CLI
        run: |
          set -euo pipefail
          ARCH="$(dpkg --print-architecture)"
          OP_VERSION="v2.31.1"
          curl -sSfL "https://cache.agilebits.com/dist/1P/op2/pkg/${OP_VERSION}/op_linux_${ARCH}_${OP_VERSION}.zip" -o /tmp/op.zip
          mkdir -p "$HOME/.local/bin"
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/op.zip').extract('op', '$HOME/.local/bin')"
          chmod +x "$HOME/.local/bin/op"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/op" --version
      - name: Run Ansible Playbook (Apply)
        working-directory: infrastructure
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          ansible-playbook -i inventory/hosts.yaml playbook.yaml ${{ needs.plan.outputs.tags && format('--tags {0}', needs.plan.outputs.tags) || '' }} ${{ inputs.limit && format('--limit {0}', inputs.limit) || '' }} -e 'ansible_python_interpreter=/usr/bin/python3'
