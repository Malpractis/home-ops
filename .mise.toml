[env]
KUBECONFIG = "{{config_root}}/kubeconfig"
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
TALOSCONFIG = "{{config_root}}/talosconfig"
JUST_UNSTABLE = "1"
LEFTHOOK_OUTPUT = "false"

_.file = ["{{config_root}}/.secrets.env"]

[tools]
"python" = "3.14.4"
"pipx:makejinja" = "2.8.2"
"aqua:budimanjojo/talhelper" = "3.1.9"
"aqua:cilium/cilium-cli" = "0.19.2"
"aqua:cli/cli" = "2.92.0"
"aqua:cloudflare/cloudflared" = "2026.3.0"
"aqua:cue-lang/cue" = "0.16.1"
"aqua:fluxcd/flux2" = "2.8.6"
"aqua:go-task/task" = "3.50.0"
"aqua:helm/helm" = "4.1.4"
"aqua:helmfile/helmfile" = "1.5.0"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubernetes-sigs/kustomize" = "5.7.1"
"aqua:kubernetes/kubectl" = "1.34.0"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:siderolabs/talos" = "1.13.0"
"aqua:yannh/kubeconform" = "0.7.0"
"aqua:mitsuhiko/minijinja" = "2.19.0"
just = "latest"
"uv" = "latest"
"pipx:flux-local" = "latest"
