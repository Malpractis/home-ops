# Bootstrap seed — ESO ExternalSecrets take over once Connect is running
# No ExternalSecret manages these directly — circular dependency (Connect needs them to start)
apiVersion: v1
kind: Secret
metadata:
  name: onepassword-connect-credentials-secret
stringData:
  1password-credentials.json: |
    op://Kubernetes/1password/OP_SESSION_JSON
---
apiVersion: v1
kind: Secret
metadata:
  name: onepassword-connect-vault-secret
stringData:
  OP_CONNECT_TOKEN: |
    op://Kubernetes/1password/OP_CONNECT_TOKEN
