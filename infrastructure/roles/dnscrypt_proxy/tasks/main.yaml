---
# --- One-time takeover from the Debian/apt dnscrypt-proxy package ---
# The Pis ship dnscrypt-proxy via apt with systemd socket activation, which
# binds :5053 independently and would collide with our role-managed daemon.
# Gated on the apt unit's presence so it only runs on the first converge.
- name: Detect apt-managed dnscrypt-proxy
  ansible.builtin.stat:
    path: /usr/lib/systemd/system/dnscrypt-proxy.service
  register: _apt_dnscrypt_unit

- name: Remove apt-managed dnscrypt-proxy (greenfield takeover)
  when: _apt_dnscrypt_unit.stat.exists
  block:
    - name: Stop and disable the apt dnscrypt-proxy service + socket
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - dnscrypt-proxy.socket
        - dnscrypt-proxy.service
      failed_when: false

    - name: Purge the apt dnscrypt-proxy package
      ansible.builtin.apt:
        name: dnscrypt-proxy
        state: absent
        purge: true

    - name: Remove leftover systemd unit overrides (frees :5053)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/dnscrypt-proxy.service
        - /etc/systemd/system/dnscrypt-proxy.service.d
        - /etc/systemd/system/dnscrypt-proxy.socket
        - /etc/systemd/system/dnscrypt-proxy.socket.d

    - name: Remove the apt-created _dnscrypt-proxy user
      ansible.builtin.user:
        name: _dnscrypt-proxy
        state: absent
      failed_when: false

- name: Create dnscrypt group
  ansible.builtin.group:
    name: "{{ dnscrypt_group }}"
    system: true

- name: Create dnscrypt user
  ansible.builtin.user:
    name: "{{ dnscrypt_user }}"
    group: "{{ dnscrypt_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ dnscrypt_install_dir }}"
    create_home: false

- name: Create install and config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ dnscrypt_user }}"
    group: "{{ dnscrypt_group }}"
    mode: "0750"
  loop:
    - "{{ dnscrypt_install_dir }}"
    - "{{ dnscrypt_config_dir }}"

- name: Check installed dnscrypt-proxy version
  ansible.builtin.command: "{{ dnscrypt_install_dir }}/dnscrypt-proxy -version"
  register: dnscrypt_installed_version
  changed_when: false
  failed_when: false
  check_mode: false   # read-only probe; must run even in --check so dry-runs are accurate

- name: Download and install dnscrypt-proxy
  when: dnscrypt_version not in (dnscrypt_installed_version.stdout | default(''))
  block:
    - name: Download dnscrypt-proxy release tarball
      ansible.builtin.get_url:
        url: "https://github.com/DNSCrypt/dnscrypt-proxy/releases/download/{{ dnscrypt_version }}/dnscrypt-proxy-{{ dnscrypt_arch }}-{{ dnscrypt_version }}.tar.gz"
        dest: "/tmp/dnscrypt-proxy-{{ dnscrypt_version }}.tar.gz"
        mode: "0644"

    - name: Extract dnscrypt-proxy binary
      ansible.builtin.unarchive:
        src: "/tmp/dnscrypt-proxy-{{ dnscrypt_version }}.tar.gz"
        dest: "/tmp"
        remote_src: true

    - name: Install binary
      ansible.builtin.copy:
        src: "/tmp/{{ dnscrypt_arch }}/dnscrypt-proxy"
        dest: "{{ dnscrypt_install_dir }}/dnscrypt-proxy"
        remote_src: true
        owner: "{{ dnscrypt_user }}"
        group: "{{ dnscrypt_group }}"
        mode: "0755"
      notify: Restart dnscrypt-proxy

- name: Fetch dnscrypt upstream stamps from 1Password Connect
  onepassword.connect.field_info:
    item: "{{ dnscrypt_op_item }}"
    vault: "{{ dnscrypt_op_vault }}"
    field: "{{ item.value }}"
  loop: "{{ dnscrypt_stamp_fields | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  delegate_to: localhost
  become: false
  no_log: true
  register: _dnscrypt_stamp_results

- name: Assemble dnscrypt_stamps map
  ansible.builtin.set_fact:
    dnscrypt_stamps: "{{ dnscrypt_stamps | default({}) | combine({ item.item.key: item.field.value }) }}"
  loop: "{{ _dnscrypt_stamp_results.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  no_log: true

- name: Template dnscrypt-proxy.toml
  ansible.builtin.template:
    src: dnscrypt-proxy.toml.j2
    dest: "{{ dnscrypt_config_dir }}/dnscrypt-proxy.toml"
    owner: "{{ dnscrypt_user }}"
    group: "{{ dnscrypt_group }}"
    mode: "0640"
  notify: Restart dnscrypt-proxy

- name: Install systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/dnscrypt-proxy.service
    mode: "0644"
    content: |
      [Unit]
      Description=dnscrypt-proxy (managed by Ansible)
      After=network-online.target
      Wants=network-online.target

      [Service]
      User={{ dnscrypt_user }}
      Group={{ dnscrypt_group }}
      ExecStart={{ dnscrypt_install_dir }}/dnscrypt-proxy -config {{ dnscrypt_config_dir }}/dnscrypt-proxy.toml
      Restart=always
      RestartSec=5
      # Sandboxing (ported from the Debian package unit). Port 5053 > 1024, so
      # no CAP_NET_BIND_SERVICE is needed.
      NoNewPrivileges=true
      ProtectSystem=strict
      ProtectHome=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      ProtectControlGroups=true
      MemoryDenyWriteExecute=true
      ReadWritePaths={{ dnscrypt_config_dir }}

      [Install]
      WantedBy=multi-user.target
  notify: Restart dnscrypt-proxy

- name: Enable and start dnscrypt-proxy
  ansible.builtin.systemd:
    name: dnscrypt-proxy
    enabled: true
    state: started
    daemon_reload: true
