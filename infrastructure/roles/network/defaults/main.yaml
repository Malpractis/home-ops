---
# network role defaults
# Manages the Pi's primary NetworkManager connection declaratively so a reimage
# (or config drift) restores the exact addressing. Values identical across all
# Pis live here; per-host address/gateway/ULA go in host_vars.

network_conn_name: "Wired connection 1"
network_ifname: eth0

# Upstream resolvers the Pi OS itself uses for its own lookups.
# NOTE: distinct from the Pihole ULA addresses advertised to LAN clients via RA.
network_v4_dns:
  - 192.168.10.2
  - 192.168.20.22
