---
- name: Configure Infrastructure Observability
  hosts: all
  become: true
  tags: ["observability"]

  pre_tasks:
    - name: Update apt cache (Debian/Ubuntu only)
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'

    - name: Manage smartmontools package
      ansible.builtin.package:
        name: smartmontools
        state: "{{ smartmontools_state | default('present') }}"

  tasks:
    - name: Node Exporter
      ansible.builtin.include_role:
        name: prometheus.prometheus.node_exporter

    - name: Smartctl Exporter
      ansible.builtin.include_role:
        name: prometheus.prometheus.smartctl_exporter

  post_tasks:
    - name: Cleanup Smartctl Exporter
      when: perform_smartctl_cleanup | default(false)
      block:
        - name: Stop and disable smartctl_exporter service
          ansible.builtin.systemd:
            name: smartctl_exporter
            state: stopped
            enabled: false
          failed_when: false

        - name: Remove smartctl_exporter systemd unit
          ansible.builtin.file:
            path: /etc/systemd/system/smartctl_exporter.service
            state: absent
          notify: Reload Systemd

        - name: Remove smartctl_exporter override directory
          ansible.builtin.file:
            path: /etc/systemd/system/smartctl_exporter.service.d
            state: absent

        - name: Remove smartctl_exporter binary
          ansible.builtin.file:
            path: /usr/local/bin/smartctl_exporter
            state: absent

  handlers:
    - name: Reload Systemd
      ansible.builtin.systemd:
        daemon_reload: true

- name: Configure Raspberry Pi networking
  hosts: raspberry_pis
  become: true
  tags: ["network"]
  serial: 1
  any_errors_fatal: true
  tasks:
    - name: Networking
      ansible.builtin.include_role:
        name: network

- name: Configure dnscrypt-proxy on Piholes
  hosts: raspberry_pis
  become: true
  tags: ["dnscrypt"]
  serial: 1
  any_errors_fatal: true
  roles:
    - role: dnscrypt_proxy
